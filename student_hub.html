<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Student Hub | All Parts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans p-4 md:p-8">

    <header class="flex flex-col sm:flex-row justify-between items-center mb-10 bg-slate-900/60 p-6 rounded-[2.5rem] border border-white/5">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-cyan-400">STUDENT HUB</h1>
            <p id="part-display-header" class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Select Your Part Below</p>
        </div>
        <div class="bg-slate-800/40 p-4 rounded-3xl border border-white/5 text-right">
            <p id="current-day" class="text-xl font-black text-white italic">MONDAY</p>
            <p id="current-date" class="text-[10px] text-slate-400 font-mono"></p>
        </div>
    </header>

    <main class="grid grid-cols-1 xl:grid-cols-3 gap-8">
        <div class="xl:col-span-2 space-y-8">
            
            <section class="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                <h3 class="font-black text-sm uppercase tracking-[0.25em] mb-6 text-cyan-400">Identity Sync</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-slate-800/60 p-4 rounded-2xl border border-white/5">
                        <label class="text-[10px] text-slate-500 font-bold uppercase">Academic Part</label>
                        <select id="year-select" class="w-full bg-transparent text-white font-bold outline-none cursor-pointer">
                            <option value="PART_I">Part I</option>
                            <option value="PART_II">Part II</option>
                            <option value="PART_IV">Part IV</option>
                        </select>
                    </div>
                    <button id="apply-sync" class="bg-cyan-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-cyan-500 transition">Update Dashboard</button>
                </div>
            </section>

            <section class="bg-slate-900 p-8 rounded-[2.5rem] border-b-4 border-cyan-500 shadow-2xl">
                <h3 id="timetable-header" class="font-black text-sm uppercase tracking-[0.25em] text-white mb-8">Today's Schedule</h3>
                <div id="timetable-list" class="space-y-6 pr-3">
                    </div>
            </section>
        </div>

        <aside class="bg-slate-900/60 p-8 rounded-[2.5rem] border border-white/5">
            <h3 class="font-black text-sm uppercase tracking-[0.25em] mb-8 text-slate-400">Coursework Tracker</h3>
            <div id="modules-marks-list" class="space-y-5">
                </div>
            <div class="mt-10 pt-8 border-t border-slate-800">
                <div class="flex justify-between items-end">
                    <p class="text-xs font-bold uppercase text-slate-500">Semester Average</p>
                    <p id="average-display" class="text-5xl font-black text-cyan-400">--%</p>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // --- MASTER DATA FROM IMAGES ---
        const MASTER_DATA = {
            "PART_I": {
                modules: [
                    { code: "BEC 1201", name: "Quantitative Analysis", lec: "Mr. P. Makunura" },
                    { code: "BEC 1202", name: "Database Design", lec: "Mr. A. Zvikaramba" },
                    { code: "BEC 1203", name: "Intellectual Property", lec: "Mr. J. B. Rushwaya" },
                    { code: "BEC 1204", name: "Visual Programming", lec: "Mr. T. Nyamugudza" }
                ],
                timetable: {
                    "MONDAY": [{ time: "08:00", code: "HIT 1201", room: "Auto" }],
                    "TUESDAY": [{ time: "08:00", code: "BEC 1203", room: "TBA" }],
                    "WEDNESDAY": [{ time: "08:00", code: "HIT 1201", room: "Auto" }],
                    "THURSDAY": [{ time: "08:00", code: "BEC 1201", room: "Auto" }],
                    "FRIDAY": [{ time: "08:00", code: "BEC 1204", room: "TBA" }]
                }
            },
            "PART_II": {
                modules: [
                    { code: "BEC 2201", name: "Web Engineering II", lec: "Mr. T. Nyamugudza" },
                    { code: "BEC 2202", name: "Electronic Marketing", lec: "Dr. Nyatsambo" },
                    { code: "BEC 2203", name: "Enterprise Systems", lec: "Ms. Nhema" }
                ],
                timetable: {
                    "MONDAY": [{ time: "08:00", code: "BEC 2203", room: "Auto" }],
                    "TUESDAY": [{ time: "08:00", code: "BEC 2202", room: "TBA" }],
                    "WEDNESDAY": [{ time: "08:00", code: "BEC 2202", room: "TBA" }],
                    "THURSDAY": [{ time: "10:15", code: "BEC 2203", room: "TBA" }],
                    "FRIDAY": [{ time: "14:00", code: "HIT 2201", room: "Auto" }]
                }
            },
            "PART_IV": {
                modules: [
                    { code: "BEC 4201", name: "Java for E-Commerce", lec: "Mr. Mudhara" },
                    { code: "BEC 4202", name: "Mobile Commerce", lec: "Mr. P. Nyoni" },
                    { code: "BEC 4203", name: "Data Mining", lec: "Miss V. Mushore" }
                ],
                timetable: {
                    "MONDAY": [{ time: "08:00", code: "BEC 4201", room: "TBA" }],
                    "TUESDAY": [{ time: "08:00", code: "BEC 4204", room: "TBA" }],
                    "WEDNESDAY": [{ time: "08:00", code: "BEC 4203", room: "TBA" }],
                    "THURSDAY": [{ time: "08:00", code: "BEC 4207", room: "TBA" }],
                    "FRIDAY": [{ time: "08:00", code: "BEC 4204", room: "TBA" }]
                }
            }
        };

        const day = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"][new Date().getDay()];
        
        function updateDashboard() {
            const selectedPart = document.getElementById('year-select').value;
            const data = MASTER_DATA[selectedPart];
            localStorage.setItem('hit_current_part', document.getElementById('year-select').value);
            // Update Header
            document.getElementById('part-display-header').innerText = `E-Commerce • ${selectedPart.replace('_', ' ')}`;
            document.getElementById('current-day').innerText = day;

            // Render Timetable
            const list = document.getElementById('timetable-list');
            const todayClasses = data.timetable[day] || [];
            list.innerHTML = todayClasses.length > 0 ? todayClasses.map(c => `
                <div class="bg-slate-800/50 p-6 rounded-3xl border border-white/5 flex justify-between items-center">
                    <div>
                        <span class="text-cyan-400 font-bold text-xs">${c.time}</span>
                        <p class="text-white font-black text-lg">${c.code}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-slate-500 text-[10px] block">ROOM</span>
                        <span class="text-white font-bold italic">${c.room}</span>
                    </div>
                </div>
            `).join('') : '<p class="text-slate-500 italic">No classes today.</p>';

            // Render Marks Tracker
            const marksList = document.getElementById('modules-marks-list');
            marksList.innerHTML = data.modules.map(m => `
                <div class="bg-slate-800/40 p-4 rounded-2xl flex justify-between items-center">
                    <p class="text-xs font-bold">${m.code}</p>
                    <input type="number" placeholder="%" class="w-16 bg-slate-950 border border-white/10 rounded-lg p-2 text-center text-cyan-400">
                </div>
            `).join('');
        }

        document.getElementById('apply-sync').onclick = updateDashboard;
        updateDashboard(); // Initial Load
    </script>
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] flex items-center gap-2 bg-slate-900/80 backdrop-blur-2xl p-2 rounded-[2rem] border border-white/10 shadow-2xl">
    
    <a href="student_hub.html" class="flex flex-col items-center justify-center w-14 h-14 rounded-full transition-all hover:bg-cyan-500/20 group">
        <span class="text-xl group-hover:scale-110 transition">📅</span>
        <span class="text-[8px] font-black text-slate-500 group-hover:text-cyan-400 uppercase tracking-tighter">Hub</span>
    </a>

    <a href="navigator_vr.html" class="flex flex-col items-center justify-center w-16 h-16 bg-cyan-600 rounded-full shadow-[0_0_20px_rgba(34,211,238,0.4)] hover:bg-cyan-500 transition-all active:scale-95 group">
        <span class="text-2xl">🥽</span>
        <span class="text-[8px] font-black text-white uppercase tracking-tighter">VR View</span>
    </a>

    <a href="campus_map_2d.html" class="flex flex-col items-center justify-center w-14 h-14 rounded-full transition-all hover:bg-green-500/20 group">
        <span class="text-xl group-hover:scale-110 transition">📍</span>
        <span class="text-[8px] font-black text-slate-500 group-hover:text-green-400 uppercase tracking-tighter">Map</span>
    </a>
</div>

<style>
    /* Ensure the dock doesn't interfere with map/VR clicks */
    .pointer-events-auto { pointer-events: auto; }
</style>
</body>
</html>
