<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT NAV PRO | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <h1 class="font-black text-cyan-600 italic uppercase">HIT NAV PRO</h1>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-tighter">Logout</button>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 tracking-tight">Campus Center</h2>
                <p id="role-display" class="text-cyan-600 text-[10px] font-bold uppercase tracking-widest mt-1 opacity-70">Detecting Role...</p>
            </div>
            <button onclick="location.href='navigator.html'" class="bg-cyan-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-lg hover:bg-cyan-700 transition active:scale-95">Open AR Nav 📍</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest text-cyan-500">Notice Board</h3>
                <div id="notif-board" class="space-y-3">
                    <p class="text-slate-400 text-xs italic">Syncing with HIT Cloud...</p>
                </div>
            </div>

            <div id="admin-broadcast" class="hidden bg-white p-6 rounded-3xl shadow-sm border-2 border-cyan-100 h-fit">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 italic">Broadcast to Campus</h3>
                <textarea id="notif-text" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm mb-3 outline-none focus:ring-2 focus:ring-cyan-500" rows="3" placeholder="What's the update, Chairman?"></textarea>
                <button id="send-notif" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs uppercase hover:bg-black transition">Publish Message</button>
            </div>

            <div id="admin-traffic" class="hidden lg:col-span-3 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Live User Traffic
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px]">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-100 uppercase tracking-tighter">
                                <th class="pb-3 px-2">User ID</th>
                                <th class="pb-3">Destination</th>
                                <th class="pb-3">Time</th>
                                <th class="pb-3 text-right">Status</th>
                            </tr>
                        </thead>
                        <tbody id="traffic-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="admin-analytics" class="hidden lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white">
                    <h3 class="font-black text-cyan-400 text-xs uppercase mb-6 tracking-widest text-center">Popular Labs & Rooms</h3>
                    <canvas id="trendingChart" height="150"></canvas>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center">
                    <h3 class="font-black text-slate-800 text-xs uppercase mb-6 tracking-widest">Total System Reach</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <p class="text-slate-400 text-[9px] font-bold uppercase">Users Active</p>
                            <p id="stat-users" class="text-2xl font-black text-slate-800">24</p>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <p class="text-slate-400 text-[9px] font-bold uppercase">Nav Requests</p>
                            <p id="stat-navs" class="text-2xl font-black text-cyan-600">0</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const role = localStorage.getItem('hit_user_role');
        const email = localStorage.getItem('hit_user_email');

        document.getElementById('role-display').innerText = `Role: ${role || 'Guest'} | ${email || ''}`;

        if (role === 'admin') {
            document.getElementById('admin-broadcast').classList.remove('hidden');
            document.getElementById('admin-traffic').classList.remove('hidden');
            document.getElementById('admin-analytics').classList.remove('hidden');
            initAdminEngine();
        }

        // --- LIVE ANNOUNCEMENTS ---
        const qNotif = query(collection(db, "Notifications"), orderBy("timestamp", "desc"), limit(5));
        onSnapshot(qNotif, (snapshot) => {
            let html = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                html += `<div class="bg-white p-4 rounded-2xl border-l-4 border-cyan-500 shadow-sm mb-3">
                            <p class="text-slate-800 text-sm font-medium">${d.message}</p>
                         </div>`;
            });
            document.getElementById('notif-board').innerHTML = html || "No campus notices.";
        });

        // --- ADMIN ENGINE (Traffic & Charts) ---
        function initAdminEngine() {
            const qTraffic = query(collection(db, "NavLogs"), orderBy("timestamp", "desc"), limit(10));
            let chartInstance = null;

            onSnapshot(qTraffic, (snapshot) => {
                let html = "";
                let roomCounts = {};
                let total = 0;

                snapshot.forEach(doc => {
                    const d = doc.data();
                    total++;
                    roomCounts[d.destination] = (roomCounts[d.destination] || 0) + 1;
                    const time = d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : "...";
                    html += `<tr class="border-b border-slate-50"><td class="py-3 px-2 font-bold">${d.userId}</td><td class="py-3 text-cyan-600">${d.destination}</td><td class="py-3 text-slate-400">${time}</td><td class="py-3 text-right"><span class="bg-green-100 text-green-600 px-2 py-0.5 rounded text-[8px] font-bold">LIVE</span></td></tr>`;
                });

                document.getElementById('traffic-body').innerHTML = html;
                document.getElementById('stat-navs').innerText = total;
                
                // Update Chart
                const ctx = document.getElementById('trendingChart').getContext('2d');
                if(chartInstance) chartInstance.destroy();
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: Object.keys(roomCounts), datasets: [{ data: Object.values(roomCounts), backgroundColor: '#22d3ee' }] },
                    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#334155' } } } }
                });
            });
        }

        if (role === 'admin') {
            document.getElementById('send-notif').onclick = async () => {
                const msg = document.getElementById('notif-text').value;
                if(msg) {
                    await addDoc(collection(db, "Notifications"), { message: msg, timestamp: serverTimestamp() });
                    document.getElementById('notif-text').value = "";
                }
            };
        }
    </script>
</body>
</html>
