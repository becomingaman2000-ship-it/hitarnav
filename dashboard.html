<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT NAV PRO | Chairman Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <h1 class="font-black text-cyan-600 italic uppercase tracking-tighter">HIT NAV PRO</h1>
        <div class="flex items-center gap-4">
            <span id="live-indicator" class="hidden flex items-center gap-1 bg-green-100 text-green-600 px-2 py-1 rounded text-[8px] font-black uppercase animate-pulse">● System Live</span>
            <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-red-100 transition">Logout</button>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight leading-none">Campus Center</h2>
                <p id="role-display" class="text-cyan-600 text-[10px] font-bold uppercase tracking-widest mt-2 opacity-70 italic">Verifying Credentials...</p>
            </div>
            <button onclick="location.href='navigator.html'" class="w-full md:w-auto bg-cyan-600 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-cyan-700 transition active:scale-95 border-b-4 border-cyan-800">Launch AR Navigator 📍</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div id="student-timetable" class="hidden lg:col-span-2 bg-slate-900 p-6 rounded-[2rem] shadow-2xl text-white border-b-4 border-cyan-500 overflow-hidden relative">
                <div class="absolute top-0 right-0 p-6 opacity-10 text-6xl">⏳</div>
                <div class="flex justify-between items-center mb-6 relative z-10">
                    <h3 class="font-black text-[10px] uppercase tracking-widest text-cyan-400">Today's Schedule</h3>
                    <span id="notif-time-top" class="text-[9px] text-slate-500 font-bold italic">Auto-Syncing...</span>
                </div>
                <div id="subjects-container" class="space-y-4 relative z-10">
                    </div>
            </div>

            <div id="student-setup" class="hidden bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 h-fit">
                <h3 class="font-black text-slate-800 text-[10px] uppercase mb-4 tracking-widest text-cyan-500">🔗 Profile Link</h3>
                <div class="space-y-3">
                    <input type="text" id="stud-id" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm outline-none focus:ring-2 focus:ring-cyan-500/20 transition" placeholder="Enter Name or ID">
                    <select id="stud-part" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold text-slate-700 outline-none">
                        <option value="2.2">Part 2.2 (E-Commerce)</option>
                    </select>
                    <button id="save-profile" class="w-full bg-cyan-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition">View My Schedule</button>
                </div>
            </div>

            <div id="campus-board-parent" class="lg:col-span-2 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-[10px] uppercase mb-5 tracking-widest flex items-center gap-2">📢 Official Notices</h3>
                <div id="notif-board" class="space-y-3 min-h-[120px]"></div>
            </div>

            <div id="admin-broadcast" class="hidden bg-white p-6 rounded-[2rem] shadow-sm border-2 border-cyan-100 h-fit">
                <h3 class="font-black text-slate-800 text-[10px] uppercase mb-4 tracking-widest italic">Chairman Broadcast</h3>
                <textarea id="notif-text" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm mb-3 outline-none focus:ring-2 focus:ring-cyan-500 transition" rows="3" placeholder="Post an update..."></textarea>
                <button id="send-notif" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-[10px] uppercase hover:bg-black transition">Publish Notice</button>
            </div>

            <div id="admin-section" class="hidden lg:col-span-3 mt-4 space-y-6">
                </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, limit, onSnapshot, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config (Keep yours)
        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const role = localStorage.getItem('hit_user_role');
        const email = localStorage.getItem('hit_user_email');
        const savedStudID = localStorage.getItem('hit_stud_id');

        document.getElementById('role-display').innerText = `${role === 'admin' ? 'Chairman' : 'Student'} | ${email}`;

        // Initialize display
        if (role === 'admin') {
            document.getElementById('admin-broadcast').classList.remove('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            document.getElementById('live-indicator').classList.remove('hidden');
        } else {
            document.getElementById('student-setup').classList.remove('hidden');
            if(savedStudID) loadTimetableFromImage();
        }

        // IMAGE DATA LOGIC: Extracting from your timetable.jpeg
        function loadTimetableFromImage() {
            const container = document.getElementById('subjects-container');
            const timetablePanel = document.getElementById('student-timetable');
            const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
            const today = days[new Date().getDay()];
            
            // This is the data mapped exactly from your JPEG for Part 2.2 E-Commerce
            const fullTimetable = {
                "MONDAY": [
                    { time: "08:00-10:00", code: "BEC 2203", module: "Enterprise Systems", lecturer: "Ms. Nhema", venue: "Auto" },
                    { time: "10:15-12:15", code: "BEC 2205", module: "Object Oriented Programming", lecturer: "Mr. Mudhara", venue: "TBA" },
                    { time: "14:00-16:00", code: "BEC 2201", module: "E-Commerce Website Engineering II", lecturer: "Mr. T. Nyamugudza", venue: "TBA" }
                ],
                "TUESDAY": [
                    { time: "08:00-10:00", code: "BEC 2202", module: "Electronic Marketing", lecturer: "Dr. M. Nyatsambo", venue: "TBA" },
                    { time: "10:15-12:15", code: "BEC 2205", module: "Object Oriented Programming", lecturer: "Mr. Mudhara", venue: "Auto" },
                    { time: "16:00-18:00", code: "BEC 2206", module: "Mandarin for Business Communication II", lecturer: "Mrs. M. Chiwenga", venue: "Multi" }
                ],
                "WEDNESDAY": [
                    { time: "08:00-10:00", code: "BEC 2202", module: "Electronic Marketing", lecturer: "Dr. M. Nyatsambo", venue: "TBA" },
                    { time: "10:15-12:15", code: "BEC 2204", module: "Financial Management", lecturer: "Mr. P. Makunura", venue: "TBA" },
                    { time: "14:00-16:00", code: "HIT 2203", module: "Big Data and Data Analytics", lecturer: "Ms. K. B. Chimwayi", venue: "Multi" }
                ],
                "THURSDAY": [
                    { time: "08:00-10:00", code: "HIT 2201", module: "Technopreneurship IV", lecturer: "TBA", venue: "Auto" },
                    { time: "10:15-12:15", code: "BEC 2203", module: "Enterprise Systems", lecturer: "Ms. Nhema", venue: "TBA" },
                    { time: "14:00-16:00", code: "BEC 2204", module: "Financial Management", lecturer: "Mr. P. Makunura", venue: "Auto" },
                    { time: "16:00-18:00", code: "BEC 2206", module: "Mandarin for Business Communication II", lecturer: "Mrs. M. Chiwenga", venue: "TBA" }
                ],
                "FRIDAY": [
                    { time: "08:00-10:00", code: "HIT 2201", module: "Technopreneurship IV", lecturer: "TBA", venue: "Auto" },
                    { time: "10:15-12:15", code: "BEC 2201", module: "E-Commerce Website Engineering II", lecturer: "Mr. T. Nyamugudza", venue: "TBA" }
                ]
            };

            const todaysClasses = fullTimetable[today] || [];
            
            if (todaysClasses.length > 0) {
                timetablePanel.classList.remove('hidden');
                let html = "";
                todaysClasses.forEach(c => {
                    html += `
                    <div class="bg-white/5 border border-white/10 p-4 rounded-2xl flex justify-between items-center group hover:bg-cyan-500/10 transition cursor-pointer">
                        <div class="flex items-center gap-4">
                            <div class="h-10 w-10 bg-cyan-500 rounded-xl flex items-center justify-center font-black text-xs">${c.code.split(' ')[1]}</div>
                            <div>
                                <p class="font-black text-sm text-white">${c.module}</p>
                                <p class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest">${c.lecturer} • Venue: ${c.venue}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-500 uppercase">${c.time}</p>
                            <span class="text-[8px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded uppercase font-bold">Confirmed</span>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
                document.getElementById('notif-time-top').innerText = `Current Day: ${today}`;
            } else {
                timetablePanel.classList.add('hidden');
            }
        }

        // Notification logic for Admin
        document.getElementById('send-notif').onclick = async () => {
            const msg = document.getElementById('notif-text').value;
            if(msg) { 
                await addDoc(collection(db, "Notifications"), { 
                    message: `Part 2.2 Reminder: ${msg}`, 
                    timestamp: serverTimestamp() 
                }); 
                document.getElementById('notif-text').value = ""; 
                alert("Part 2.2 students have been notified!");
            }
        };

        document.getElementById('save-profile').onclick = () => {
            const id = document.getElementById('stud-id').value;
            localStorage.setItem('hit_stud_id', id);
            location.reload();
        };

        // ... Keep existing Firebase Listeners for Admin Intelligence ...
    </script>
</body>
</html>
