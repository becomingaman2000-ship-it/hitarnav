<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight text-cyan-600">HIT NAV DASHBOARD</h1>
            <button onclick="localStorage.clear(); location.href='index.html'" class="text-red-500 font-bold text-sm">Sign Out</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onclick="location.href='navigator.html'" class="bg-white p-8 rounded-3xl shadow-sm border cursor-pointer hover:border-cyan-400 transition">
                <div class="text-4xl mb-4">📍</div>
                <h2 class="text-xl font-bold text-slate-800">Start Navigation</h2>
                <p class="text-slate-500 text-sm">Launch AR campus guidance</p>
            </div>

            <div id="admin-panel" class="hidden bg-slate-900 p-8 rounded-3xl text-white">
                <h2 class="text-xl font-bold mb-4 italic">Chairman's Log</h2>
                <div id="logs-container" class="text-xs space-y-3 opacity-90 max-h-64 overflow-y-auto">
                    Loading tracking data...
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const role = localStorage.getItem('hit_user_role');
        if (role === 'admin') {
            document.getElementById('admin-panel').classList.remove('hidden');
            const q = query(collection(db, "NavigationLogs"), orderBy("timestamp", "desc"), limit(10));
            const querySnapshot = await getDocs(q);
            let html = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const dateStr = data.timestamp ? data.timestamp.toDate().toLocaleString() : "Real-time";
                html += `<div class="border-b border-slate-700 pb-2">
                    <span class="text-cyan-400 font-bold">${data.email}</span> → <span class="text-white">${data.destination}</span><br>
                    <span class="opacity-40 text-[10px] uppercase">${dateStr}</span>
                </div>`;
            });
            document.getElementById('logs-container').innerHTML = html || "No routes found.";
        }
    </script>
</body>
</html>
