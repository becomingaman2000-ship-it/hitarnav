<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Dashboard | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-5 flex justify-between items-center sticky top-0 z-50">
        <h1 class="font-black text-cyan-600 tracking-tighter text-xl italic uppercase">HIT NAV PRO</h1>
        <div class="flex items-center gap-4">
            <span id="user-badge" class="hidden md:block text-[10px] font-bold bg-cyan-100 text-cyan-700 px-3 py-1 rounded-full uppercase tracking-widest"></span>
            <button onclick="localStorage.clear(); location.href='index.html'" class="text-red-500 font-bold text-xs hover:underline">LOGOUT</button>
        </div>
    </nav>

    <main class="p-6 max-w-5xl mx-auto">
        <div class="mb-10">
            <h2 class="text-3xl font-bold text-slate-800">Welcome, <span id="user-name" class="text-cyan-600 font-black">USER</span></h2>
            <p class="text-slate-500 text-sm mt-1 uppercase tracking-tighter font-bold opacity-60">Campus Management & Navigation Console</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div onclick="location.href='navigator.html'" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 cursor-pointer hover:border-cyan-400 hover:shadow-xl transition-all group">
                <div class="w-14 h-14 bg-cyan-50 rounded-2xl flex items-center justify-center text-2xl mb-4 group-hover:bg-cyan-500 group-hover:text-white transition-colors">📍</div>
                <h3 class="font-bold text-slate-800 text-lg uppercase tracking-tight">AR Navigator</h3>
                <p class="text-slate-400 text-xs mt-2 leading-relaxed">Access real-time 3D guidance to HIT venues and labs.</p>
            </div>

            <div id="admin-panel" class="hidden md:col-span-2 bg-slate-900 p-8 rounded-3xl text-white shadow-2xl overflow-hidden relative border-t-4 border-cyan-500">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-xl italic text-cyan-400 uppercase tracking-tight">Chairman's Tracking Log</h3>
                    <span class="text-[10px] bg-slate-800 px-2 py-1 rounded border border-slate-700 font-mono">LIVE SYNC ACTIVE</span>
                </div>
                <div id="logs-container" class="space-y-4 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                    <p class="text-slate-500 text-xs italic">Awaiting route synchronization...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const role = localStorage.getItem('hit_user_role');
        const email = localStorage.getItem('hit_user_email');

        if (!role) window.location.href = 'index.html';

        document.getElementById('user-badge').innerText = role;
        document.getElementById('user-name').innerText = email.split('@')[0].toUpperCase();

        if (role === 'admin') {
            document.getElementById('admin-panel').classList.remove('hidden');
            const loadData = async () => {
                const q = query(collection(db, "NavigationLogs"), orderBy("timestamp", "desc"), limit(15));
                const snap = await getDocs(q);
                let html = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const date = d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : "Just now";
                    html += `
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 flex justify-between items-center hover:bg-slate-800 transition-colors">
                        <div>
                            <p class="text-cyan-400 font-bold text-xs uppercase">${d.email}</p>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">Destination: <span class="text-white font-bold">${d.destination}</span></p>
                        </div>
                        <p class="text-[9px] text-slate-500 font-mono font-bold tracking-widest">${date}</p>
                    </div>`;
                });
                document.getElementById('logs-container').innerHTML = html || "No recent movement logs.";
            };
            loadData();
        }
    </script>
</body>
</html>
