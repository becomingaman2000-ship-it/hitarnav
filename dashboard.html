<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Dashboard | Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <h1 class="font-black text-cyan-600 italic uppercase">HIT NAV PRO</h1>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-tighter">Sign Out</button>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-slate-800 tracking-tight">System Analytics</h2>
            <p id="role-display" class="text-cyan-600 text-xs font-bold uppercase tracking-widest mt-1 opacity-70"></p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Total Logins</p>
                    <h4 id="total-logins" class="text-4xl font-black text-slate-800">0</h4>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Active Destinations</p>
                    <h4 id="active-dest" class="text-4xl font-black text-cyan-500">5</h4>
                </div>
                <div onclick="location.href='navigator.html'" class="bg-cyan-600 p-6 rounded-3xl shadow-lg cursor-pointer hover:bg-cyan-700 transition flex items-center justify-between text-white">
                    <div>
                        <p class="text-[10px] font-bold opacity-80 uppercase">Navigation</p>
                        <h4 class="text-xl font-black uppercase">Launch AR</h4>
                    </div>
                    <span class="text-3xl">🚀</span>
                </div>
            </div>

            <div id="admin-charts" class="hidden lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-4 text-sm uppercase italic">User Distribution</h3>
                    <canvas id="userChart"></canvas>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-4 text-sm uppercase italic">Popular Destinations</h3>
                    <canvas id="destChart"></canvas>
                </div>
            </div>

            <div id="admin-logs" class="hidden bg-slate-900 p-6 rounded-3xl text-white shadow-2xl h-fit border-t-4 border-cyan-400">
                <h3 class="font-black text-cyan-400 text-xs uppercase mb-4 tracking-widest">Chairman's Live Feed</h3>
                <div id="logs-container" class="space-y-3 max-h-96 overflow-y-auto pr-2 text-[10px]">
                    Syncing database...
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const role = localStorage.getItem('hit_user_role');

        document.getElementById('role-display').innerText = "Logged in as " + role;

        if (role === 'admin') {
            document.getElementById('admin-charts').classList.remove('hidden');
            document.getElementById('admin-logs').classList.remove('hidden');
            
            // 📊 Load Data for Charts
            const logSnap = await getDocs(collection(db, "Logins"));
            const navSnap = await getDocs(collection(db, "NavigationLogs"));
            
            document.getElementById('total-logins').innerText = logSnap.size;

            // Process User Distribution
            let stats = { student: 0, staff: 0, guest: 0 };
            logSnap.forEach(doc => { if(stats[doc.data().role] !== undefined) stats[doc.data().role]++; });

            new Chart(document.getElementById('userChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Students', 'Staff', 'Guests'],
                    datasets: [{
                        data: [stats.student, stats.staff, stats.guest],
                        backgroundColor: ['#0891b2', '#0e7490', '#cbd5e1']
                    }]
                }
            });

            // Process Popular Destinations
            let dests = {};
            navSnap.forEach(doc => {
                let d = doc.data().destination;
                dests[d] = (dests[d] || 0) + 1;
            });

            new Chart(document.getElementById('destChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(dests),
                    datasets: [{
                        label: 'Visits',
                        data: Object.values(dests),
                        backgroundColor: '#06b6d4'
                    }]
                }
            });

            // Populate Logs
            let logHtml = "";
            navSnap.forEach(doc => {
                const d = doc.data();
                logHtml += `<div class="bg-slate-800 p-3 rounded-xl border border-slate-700">
                    <p class="text-cyan-400 font-bold">${d.email}</p>
                    <p class="opacity-60 font-black">📍 ${d.destination}</p>
                </div>`;
            });
            document.getElementById('logs-container').innerHTML = logHtml || "No navigation events.";
        }
    </script>
</body>
</html>
