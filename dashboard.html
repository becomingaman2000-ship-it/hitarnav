<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Dashboard | Smart Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <h1 class="font-black text-cyan-600 italic uppercase">HIT NAV PRO</h1>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-tighter">Sign Out</button>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 tracking-tight">Campus Command</h2>
                <p id="role-display" class="text-cyan-600 text-xs font-bold uppercase tracking-widest mt-1 opacity-70"></p>
            </div>
            <button onclick="location.href='navigator.html'" class="bg-cyan-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-lg hover:bg-cyan-700 transition">Open AR Nav 📍</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div id="student-setup" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest">🔗 Link Student Profile</h3>
                <input type="text" id="stud-id" class="w-full p-3 bg-slate-50 border rounded-xl text-sm mb-3" placeholder="Student ID (e.g. H230...)">
                <select id="stud-part" class="w-full p-3 bg-slate-50 border rounded-xl text-sm mb-3">
                    <option value="">Select Your Part</option>
                    <option value="2.1">Part 2.1 (E-Commerce)</option>
                    <option value="2.2">Part 2.2 (E-Commerce)</option>
                </select>
                <button id="save-profile" class="w-full bg-cyan-600 text-white py-3 rounded-xl font-bold text-xs uppercase">Link My Courses</button>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest">📢 Live Notices & Alerts</h3>
                <div id="notif-board" class="space-y-3">
                    <p class="text-slate-400 text-xs italic">Syncing with HIT Timetable...</p>
                </div>
            </div>

            <div id="admin-broadcast" class="hidden bg-white p-6 rounded-3xl shadow-sm border-2 border-cyan-100">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4">Create Manual Alert</h3>
                <textarea id="notif-text" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm mb-3" rows="2" placeholder="Type campus alert..."></textarea>
                <button id="send-notif" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs uppercase">Publish Message</button>
            </div>

            <div id="admin-charts" class="hidden lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200"><canvas id="userChart"></canvas></div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200"><canvas id="destChart"></canvas></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs, addDoc, serverTimestamp, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const role = localStorage.getItem('hit_user_role');
        const email = localStorage.getItem('hit_user_email');

        document.getElementById('role-display').innerText = `Role: ${role} | ${email}`;

        // --- MASTER TIMETABLE DATA ---
        const timetable = {
            "2.2": [
                { day: 1, time: "09:00", subject: "E-Commerce Strategy", room: "S1 Lab", lecturer: "Dr. Moyo" },
                { day: 2, time: "11:00", subject: "Business Mandarin", room: "N1 Room", lecturer: "Ms. Zhao" },
                { day: 3, time: "14:00", subject: "Network Security", room: "Innovation Hub", lecturer: "Mr. Phiri" }
            ]
        };

        // --- 1. HANDLE STUDENT PROFILE ---
        if (role === 'student') {
            document.getElementById('student-setup').classList.remove('hidden');
            document.getElementById('save-profile').onclick = () => {
                const id = document.getElementById('stud-id').value;
                const part = document.getElementById('stud-part').value;
                if(!id || !part) return alert("Fill all fields");
                localStorage.setItem('hit_stud_id', id);
                localStorage.setItem('hit_stud_part', part);
                location.reload();
            };
        }

        // --- 2. AUTOMATED NOTIFICATION LOGIC (The "8PM" Rule) ---
        const checkAutomatedAlerts = () => {
            const part = localStorage.getItem('hit_stud_part');
            if (!part || !timetable[part]) return [];

            const now = new Date();
            const hour = now.getHours();
            const tomorrow = (now.getDay() + 1) % 7; // Get day index for tomorrow

            // Only trigger if it's after 8 PM (20:00)
            if (hour >= 20 || hour < 4) { 
                const lectures = timetable[part].filter(l => l.day === tomorrow);
                return lectures.map(l => ({
                    message: `📝 TOMORROW'S LECTURE: ${l.subject} at ${l.time}. Room: ${l.room} with ${l.lecturer}.`,
                    type: "auto",
                    timestamp: new Date()
                }));
            }
            return [];
        };

        // --- 3. LIVE NOTIFICATION BOARD ---
        const renderBoard = () => {
            const manualQuery = query(collection(db, "Notifications"), orderBy("timestamp", "desc"), limit(5));
            
            onSnapshot(manualQuery, (snapshot) => {
                let html = "";
                
                // Add Automated Alerts first (if any)
                const autoAlerts = checkAutomatedAlerts();
                autoAlerts.forEach(a => {
                    html += `<div class="bg-cyan-600 text-white p-4 rounded-2xl shadow-md border-b-4 border-cyan-800 animate-pulse">
                        <p class="text-[10px] font-black uppercase opacity-80">Automated Schedule Alert</p>
                        <p class="text-sm font-bold">${a.message}</p>
                    </div>`;
                });

                // Add Manual Admin Notices (Filter for 24 hours)
                const oneDayAgo = Date.now() - (24 * 60 * 60 * 1000);
                
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const ts = d.timestamp ? d.timestamp.toDate().getTime() : Date.now();
                    
                    if (ts > oneDayAgo) { // 24-Hour Expiry Check
                        html += `<div class="bg-slate-50 p-4 rounded-2xl border-l-4 border-slate-300">
                            <p class="text-slate-800 text-sm font-medium">${d.message}</p>
                            <p class="text-[9px] text-slate-400 mt-2 uppercase">Posted: ${new Date(ts).toLocaleString()}</p>
                        </div>`;
                    }
                });
                document.getElementById('notif-board').innerHTML = html || "No active notices for the next 24 hours.";
            });
        };
        renderBoard();

        // --- 4. ADMIN FEATURES ---
        if (role === 'admin') {
            document.getElementById('admin-broadcast').classList.remove('hidden');
            document.getElementById('admin-charts').classList.remove('hidden');
            document.getElementById('send-notif').onclick = async () => {
                const msg = document.getElementById('notif-text').value;
                if(!msg) return;
                await addDoc(collection(db, "Notifications"), { message: msg, timestamp: serverTimestamp() });
                document.getElementById('notif-text').value = "";
            };

            // Basic Chart Initialization
            const ctx1 = document.getElementById('userChart').getContext('2d');
            new Chart(ctx1, { type: 'doughnut', data: { labels: ['Stud', 'Staff', 'Guest'], datasets: [{ data: [10, 5, 2], backgroundColor: ['#06b6d4', '#0e7490', '#cbd5e1'] }] } });
        }
    </script>
</body>
</html>
