<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Dashboard | FIXED & Quick View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <h1 class="font-black text-cyan-600 italic uppercase">HIT NAV PRO</h1>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-tighter">Logout</button>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 tracking-tight">Campus Center</h2>
                <p id="role-display" class="text-cyan-600 text-[10px] font-bold uppercase tracking-widest mt-1 opacity-70">Detecting Role...</p>
            </div>
            <button onclick="location.href='navigator.html'" class="bg-cyan-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-lg hover:bg-cyan-700 transition active:scale-95">Open AR Nav 📍</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest">📢 Campus Board</h3>
                <div id="notif-board" class="space-y-3">
                    <p class="text-slate-400 text-xs italic">Syncing with HIT Cloud...</p>
                </div>
            </div>

            <div id="admin-broadcast" class="hidden bg-white p-6 rounded-3xl shadow-sm border-2 border-cyan-100 h-fit">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4">Chairman Broadcast</h3>
                <textarea id="notif-text" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm mb-3 outline-none focus:ring-2 focus:ring-cyan-500" rows="3" placeholder="Type notification..."></textarea>
                <button id="send-notif" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs uppercase hover:bg-black transition">Publish Message</button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 text-center">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest">Academic Schedule</h3>
                <button onclick="document.getElementById('tt-modal').style.display='flex'" class="w-full bg-slate-100 text-slate-700 py-4 rounded-2xl font-black text-xs uppercase hover:bg-slate-200 transition">
                    🖼️ View Full Timetable
                </button>
            </div>

            <div id="student-setup" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest">🔗 Student Sync</h3>
                <input type="text" id="stud-id" class="w-full p-3 bg-slate-50 border rounded-xl text-sm mb-3" placeholder="Student ID (H23...)">
                <select id="stud-part" class="w-full p-3 bg-slate-50 border rounded-xl text-sm mb-3 font-bold text-slate-700">
                    <option value="1.2">Part 1.2</option>
                    <option value="2.2">Part 2.2</option>
                    <option value="4.2">Part 4.2</option>
                </select>
                <button id="save-profile" class="w-full bg-cyan-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-md hover:bg-cyan-700">Link Timetable</button>
            </div>
        </div>
    </main>

    <div id="tt-modal" style="display:none;" class="fixed inset-0 bg-black/80 z-[9999] p-6 flex-col items-center justify-center">
        <button onclick="this.parentElement.style.display='none'" class="mb-4 bg-white text-black px-6 py-2 rounded-full font-black text-xs uppercase hover:scale-105 transition">CLOSE VIEW</button>
        <img src="timetable.jpeg" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl border-4 border-white">
        <p class="text-white text-[10px] mt-4 opacity-50 uppercase tracking-widest">HIT Semester 2 Schedule</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🛡️ ROLE DETECTION & Fallback
        const role = localStorage.getItem('hit_user_role');
        const email = localStorage.getItem('hit_user_email');

        if (!role) {
            alert("No session found. Redirecting to login.");
            window.location.href = 'index.html';
        }

        document.getElementById('role-display').innerText = `Role: ${role.toUpperCase()} | ${email}`;

        // UNLOCK PANELS BASED ON ROLE
        if (role === 'admin') {
            document.getElementById('admin-broadcast').classList.remove('hidden');
        } else if (role === 'student') {
            document.getElementById('student-setup').classList.remove('hidden');
        }

        // --- 📢 LIVE BOARD LOGIC ---
        const qNotif = query(collection(db, "Notifications"), orderBy("timestamp", "desc"), limit(5));
        onSnapshot(qNotif, (snapshot) => {
            let html = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const time = d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : "Just now";
                html += `
                <div class="bg-white p-4 rounded-2xl border-l-4 border-cyan-500 shadow-sm mb-3 hover:bg-slate-50 transition-colors">
                    <p class="text-slate-800 text-sm font-medium mb-1">${d.message}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[8px] font-black text-cyan-600 uppercase">HIT OFFICIAL</span>
                        <span class="text-[8px] text-slate-400 font-mono">${time}</span>
                    </div>
                </div>`;
            });
            document.getElementById('notif-board').innerHTML = html || "No campus notices today.";
        });

        // --- ✍️ ADMIN SENDING LOGIC ---
        if (role === 'admin') {
            document.getElementById('send-notif').onclick = async () => {
                const msg = document.getElementById('notif-text').value;
                if(!msg) return;
                try {
                    await addDoc(collection(db, "Notifications"), {
                        message: msg,
                        timestamp: serverTimestamp(),
                        author: email
                    });
                    document.getElementById('notif-text').value = "";
                } catch(e) { alert("Error: " + e.message); }
            };
        }

        // --- 🔗 STUDENT SAVE LOGIC ---
        if (role === 'student') {
            document.getElementById('save-profile').onclick = () => {
                const id = document.getElementById('stud-id').value;
                const part = document.getElementById('stud-part').value;
                if(!id) return alert("Please enter Student ID");
                localStorage.setItem('hit_stud_id', id);
                localStorage.setItem('hit_stud_part', part);
                alert("✅ Profile Linked: " + part);
                location.reload();
            };
        }
    </script>
</body>
</html>
