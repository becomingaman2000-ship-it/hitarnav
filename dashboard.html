<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT NAV PRO | Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <h1 class="font-black text-cyan-600 italic uppercase">HIT NAV PRO</h1>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-tighter">Logout</button>
    </nav>

    <main class="p-6 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 tracking-tight">Campus Hub</h2>
                <p id="role-display" class="text-cyan-600 text-[10px] font-bold uppercase tracking-widest mt-1 opacity-70 italic">Access: Detecting...</p>
            </div>
            <button onclick="location.href='navigator.html'" class="bg-cyan-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-lg hover:bg-cyan-700 transition active:scale-95">Open AR Nav 📍</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div id="student-timetable" class="hidden lg:col-span-2 bg-slate-900 p-6 rounded-3xl shadow-xl text-white border-b-4 border-cyan-500">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-[10px] uppercase tracking-widest text-cyan-400">Next Scheduled Session</h3>
                    <span id="notif-time-top" class="text-[9px] text-slate-500 font-bold italic">--:--</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-cyan-500/20 p-3 rounded-2xl"><span class="text-2xl">📖</span></div>
                    <div>
                        <p id="next-course" class="text-lg font-black leading-tight">No Class Linked</p>
                        <p id="next-room" class="text-cyan-400 text-xs font-bold uppercase tracking-tighter italic">Sync your ID below</p>
                    </div>
                </div>
            </div>

            <div id="student-setup" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-200 h-fit">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest text-cyan-500">🔗 Profile Link</h3>
                <input type="text" id="stud-id" class="w-full p-3 bg-slate-50 border rounded-xl text-sm mb-3 outline-none focus:ring-1 focus:ring-cyan-500" placeholder="Student ID (H23...)">
                <select id="stud-part" class="w-full p-3 bg-slate-50 border rounded-xl text-sm mb-3 font-bold text-slate-700">
                    <option value="1.2">Part 1.2</option>
                    <option value="2.2">Part 2.2</option>
                    <option value="4.2">Part 4.2</option>
                </select>
                <button id="save-profile" class="w-full bg-cyan-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-md active:scale-95 transition">Save & Sync</button>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 tracking-widest text-cyan-500 flex items-center gap-2">📢 Official Board</h3>
                <div id="notif-board" class="space-y-3">
                    <p class="text-slate-400 text-xs italic">Syncing with HIT Cloud...</p>
                </div>
            </div>

            <div id="admin-broadcast" class="hidden bg-white p-6 rounded-3xl shadow-sm border-2 border-cyan-100 h-fit">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4 italic">Campus Update</h3>
                <textarea id="notif-text" class="w-full p-4 bg-slate-50 border rounded-2xl text-sm mb-3 outline-none" rows="3" placeholder="Broadcast a message..."></textarea>
                <button id="send-notif" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs uppercase">Publish Notice</button>
            </div>

            <div id="admin-section" class="hidden lg:col-span-3 grid grid-cols-1 lg:grid-cols-3 gap-6 pt-6">
                <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <h3 class="font-black text-slate-800 text-xs uppercase mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Live Traffic Feed
                    </h3>
                    <table class="w-full text-left text-[11px]">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-100 uppercase font-black"><th class="pb-2">User</th><th class="pb-2">To</th><th class="pb-2">Time</th></tr>
                        </thead>
                        <tbody id="traffic-body"></tbody>
                    </table>
                </div>
                <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl">
                    <h3 class="font-black text-cyan-400 text-[10px] uppercase mb-4 text-center">Popular Targets</h3>
                    <canvas id="trendingChart" height="200"></canvas>
                    <p id="stat-navs" class="text-center text-3xl font-black text-cyan-500 mt-4">0</p>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, limit, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const role = localStorage.getItem('hit_user_role');
        const email = localStorage.getItem('hit_user_email');
        const savedStudID = localStorage.getItem('hit_stud_id');

        document.getElementById('role-display').innerText = `Role: ${role?.toUpperCase()} | ${email}`;

        // Panel Visibility Logic
        if (role === 'admin') {
            document.getElementById('admin-broadcast').classList.remove('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            initAdminLogic();
        } else {
            document.getElementById('student-setup').classList.remove('hidden');
            document.getElementById('student-timetable').classList.remove('hidden');
            if(savedStudID) syncStudentSchedule(savedStudID);
        }

        // --- 📢 PUBLIC LIVE BOARD ---
        onSnapshot(query(collection(db, "Notifications"), orderBy("timestamp", "desc"), limit(5)), (snapshot) => {
            let html = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const time = d.timestamp ? d.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "Just now";
                html += `
                <div class="bg-white p-4 rounded-2xl border-l-4 border-cyan-500 shadow-sm mb-3">
                    <p class="text-slate-800 text-sm font-medium mb-1">${d.message}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[8px] font-black text-cyan-600 uppercase tracking-widest">Official Update</span>
                        <span class="text-[8px] text-slate-400 font-mono">${time}</span>
                    </div>
                </div>`;
            });
            document.getElementById('notif-board').innerHTML = html || "No campus notices.";
        });

        // --- ✍️ ADMIN ACTIONS ---
        if (role === 'admin') {
            document.getElementById('send-notif').onclick = async () => {
                const msg = document.getElementById('notif-text').value;
                if(msg) { await addDoc(collection(db, "Notifications"), { message: msg, timestamp: serverTimestamp() }); document.getElementById('notif-text').value = ""; }
            };
        }

        // --- 🔗 STUDENT SETUP ACTIONS ---
        document.getElementById('save-profile').onclick = () => {
            const id = document.getElementById('stud-id').value;
            const part = document.getElementById('stud-part').value;
            if(!id) return alert("Enter Student ID");
            localStorage.setItem('hit_stud_id', id);
            localStorage.setItem('hit_stud_part', part);
            alert("✅ Linked to " + part);
            location.reload();
        };

        // --- 📅 24-HOUR TIMETABLE LOGIC ---
        async function syncStudentSchedule(id) {
            const q = query(collection(db, "Schedules"), where("studentId", "==", id), limit(1));
            onSnapshot(q, (snapshot) => {
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const postTime = data.timestamp.toDate();
                    const diff = (new Date() - postTime) / (1000 * 60 * 60);
                    if (diff < 24) {
                        document.getElementById('next-course').innerText = data.courseName;
                        document.getElementById('next-room').innerText = `Room: ${data.roomCode}`;
                        document.getElementById('notif-time-top').innerText = `Posted ${postTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                    } else {
                        document.getElementById('student-timetable').classList.add('hidden');
                    }
                });
            });
        }

        // --- 📈 ADMIN ANALYTICS ---
        function initAdminLogic() {
            let chart = null;
            onSnapshot(query(collection(db, "NavLogs"), orderBy("timestamp", "desc"), limit(10)), (snapshot) => {
                let html = ""; let counts = {}; let total = 0;
                snapshot.forEach(doc => {
                    const d = doc.data(); total++;
                    counts[d.destination] = (counts[d.destination] || 0) + 1;
                    const t = d.timestamp ? d.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "..";
                    html += `<tr class="border-b border-slate-50"><td class="py-3 font-bold">${d.userId.split('@')[0]}</td><td class="py-3 text-cyan-600 font-bold">${d.destination}</td><td class="py-3 text-slate-400 font-mono">${t}</td></tr>`;
                });
                document.getElementById('traffic-body').innerHTML = html;
                document.getElementById('stat-navs').innerText = total;
                const ctx = document.getElementById('trendingChart').getContext('2d');
                if(chart) chart.destroy();
                chart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: '#22d3ee' }] }, options: { indexAxis: 'y', plugins: { legend: { display: false } } } });
            });
        }
    </script>
</body>
</html>
