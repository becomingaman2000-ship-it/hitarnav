<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Dashboard | Timetable Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="font-black text-cyan-600 italic uppercase">HIT NAV PRO</h1>
        <button onclick="localStorage.clear(); location.href='index.html'" class="text-red-500 font-bold text-[10px] uppercase">Logout</button>
    </nav>

    <main class="p-6 max-w-5xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-slate-800">Campus Sync</h2>
            <p id="user-info" class="text-cyan-600 text-[10px] font-bold uppercase tracking-widest mt-1"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div id="student-panel" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4">Link Student ID</h3>
                <input type="text" id="sid" class="w-full p-3 bg-slate-50 rounded-xl mb-3 text-sm" placeholder="H230...">
                <select id="spart" class="w-full p-3 bg-slate-50 rounded-xl mb-3 text-sm">
                    <option value="">Select Part (Semester 2)</option>
                    <option value="1.2">Part 1.2</option>
                    <option value="2.2">Part 2.2</option>
                    <option value="4.2">Part 4.2</option>
                </select>
                <button id="btn-sync" class="w-full bg-cyan-600 text-white py-3 rounded-xl font-bold text-xs uppercase">Sync My Timetable</button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="font-black text-slate-800 text-xs uppercase mb-4">🔔 Live Board</h3>
                <div id="notif-area" class="space-y-3">
                    <p class="text-slate-400 text-xs italic">Loading campus data...</p>
                </div>
            </div>

            <div id="admin-tools" class="hidden md:col-span-2 bg-slate-900 p-8 rounded-3xl text-white shadow-xl">
                <h3 class="text-cyan-400 font-black text-xs uppercase mb-4 tracking-widest italic">Chairman's Control Panel</h3>
                <textarea id="admin-msg" class="w-full bg-slate-800 p-4 rounded-2xl text-sm border border-slate-700 mb-4" placeholder="Emergency alert or general notice..."></textarea>
                <button id="btn-post" class="bg-cyan-500 text-white px-8 py-3 rounded-xl font-black text-xs uppercase hover:bg-cyan-400 transition">Publish Broadcast</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const role = localStorage.getItem('hit_user_role');
        const email = localStorage.getItem('hit_user_email');

        document.getElementById('user-info').innerText = `${role} | ${email}`;

        // 🛡️ ADMIN SETUP
        if(role === 'admin') document.getElementById('admin-tools').classList.remove('hidden');
        if(role === 'student') document.getElementById('student-panel').classList.remove('hidden');

        // 🔗 PROFILE SYNC
        document.getElementById('btn-sync').onclick = () => {
            localStorage.setItem('hit_sid', document.getElementById('sid').value);
            localStorage.setItem('hit_spart', document.getElementById('spart').value);
            location.reload();
        };

        // 📢 LOAD NOTIFICATIONS (Manual & Auto)
        const loadNotifs = async () => {
            const q = query(collection(db, "Notifications"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, async (snap) => {
                let html = "";
                const now = new Date();
                const currentHour = now.getHours();
                const userPart = localStorage.getItem('hit_spart');

                // 🤖 AUTOMATED LOGIC: Trigger at 8 PM for tomorrow
                if (userPart && (currentHour >= 20 || currentHour < 5)) {
                    try {
                        const response = await fetch('timetable.json');
                        const data = await response.json();
                        const tomorrow = (now.getDay() + 1) % 7;
                        const lectures = data[userPart]?.filter(l => l.day === tomorrow);

                        lectures?.forEach(l => {
                            html += `
                            <div class="bg-cyan-600 text-white p-4 rounded-2xl shadow-lg border-b-4 border-cyan-800 animate-pulse">
                                <p class="text-[9px] font-black uppercase opacity-70">Schedule Sync: Tomorrow</p>
                                <p class="text-sm font-bold">Lecture: ${l.subject} at ${l.time}</p>
                                <p class="text-[10px] mt-1 italic">${l.lecturer} in ${l.room}</p>
                            </div>`;
                        });
                    } catch(e) { console.log("Timetable file not found yet on GitHub."); }
                }

                // 📩 ADMIN NOTICES (24-Hour Expiry)
                const dayInMs = 24 * 60 * 60 * 1000;
                snap.forEach(doc => {
                    const d = doc.data();
                    const ts = d.timestamp ? d.timestamp.toDate().getTime() : Date.now();
                    if (Date.now() - ts < dayInMs) {
                        html += `
                        <div class="bg-slate-100 p-4 rounded-2xl border-l-4 border-slate-400">
                            <p class="text-slate-800 text-sm font-medium">${d.message}</p>
                            <p class="text-[8px] text-slate-400 mt-2 uppercase">${new Date(ts).toLocaleTimeString()}</p>
                        </div>`;
                    }
                });
                document.getElementById('notif-area').innerHTML = html || "No active notices.";
            });
        };

        // ✍️ ADMIN POSTING
        document.getElementById('btn-post').onclick = async () => {
            const msg = document.getElementById('admin-msg').value;
            if(!msg) return;
            await addDoc(collection(db, "Notifications"), { message: msg, timestamp: serverTimestamp() });
            document.getElementById('admin-msg').value = "";
        };

        loadNotifs();
    </script>
</body>
</html>
