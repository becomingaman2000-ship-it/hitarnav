<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIT AR | Master Navigator Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif; }
        #arjs-video { position: fixed !important; top: 0; left: 0; width: 100% !important; height: 100% !important; object-fit: cover !important; z-index: -1 !important; }
        .ui-layer { z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .ai-wave { background: linear-gradient(90deg, #22d3ee, #0891b2, #22d3ee); background-size: 200% 200%; animation: wave 2s linear infinite; }
        @keyframes wave { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    </style>
</head>
<body>

    <div class="ui-layer fixed inset-0 flex flex-col justify-between p-6">
        <div class="flex justify-between items-center interactive">
            <button onclick="location.href='dashboard.html'" class="bg-black/60 backdrop-blur-md text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase border border-white/10 flex items-center gap-2">
                <span class="text-lg">←</span> Back
            </button>
            <div class="bg-cyan-500/20 backdrop-blur-md text-cyan-400 px-4 py-2 rounded-full border border-cyan-500/30 text-[9px] font-bold uppercase tracking-widest">
                VR Enabled Mode
            </div>
        </div>

        <div class="space-y-4 interactive">
            <div class="bg-black/50 backdrop-blur-2xl p-4 rounded-[2.5rem] border border-white/10 shadow-2xl">
                <div class="flex flex-col gap-2">
                    <select id="start-node" class="bg-slate-900/90 text-cyan-400 text-[10px] p-3 rounded-xl outline-none border border-cyan-500/30 font-bold uppercase">
                        <option value="entrance">📍 Start: Main Entrance</option>
                        <option value="s1">📍 Start: S1 Conference</option>
                        <option value="n1">📍 Start: N1 Hydraulic</option>
                    </select>

                    <select id="end-node" class="bg-slate-800/80 text-white text-[11px] p-3 rounded-xl outline-none border border-white/5 font-bold">
                        <option value="">Where are we going?</option>
                        <optgroup label="S-BLOCK" id="s-group"></optgroup>
                        <optgroup label="N-BLOCK" id="n-group"></optgroup>
                    </select>
                    <button id="go-btn" class="ai-wave text-white py-3 mt-1 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg">Activate Navigation</button>
                </div>
            </div>

            <div class="flex flex-col items-center pb-6">
                <div id="voice-trigger" class="w-16 h-16 bg-cyan-500 rounded-full flex items-center justify-center text-2xl shadow-2xl cursor-pointer active:scale-90 transition-transform">🎙️</div>
                <div class="mt-4 bg-black/60 backdrop-blur-lg border border-white/10 px-6 py-2 rounded-full text-center">
                    <p id="ai-status" class="text-white/60 text-[8px] font-medium">Ready for VR/AR Pathfinding</p>
                </div>
            </div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: true">
        <a-assets>
            <a-asset-item id="building-mesh" src="building.glb"></a-asset-item>
        </a-assets>

        <a-entity id="vr-building" gltf-model="#building-mesh" position="0 0 0" visible="false"></a-entity>
        
        <a-entity id="path-dots"></a-entity>
        <a-entity id="destination-marker" visible="false">
            <a-cone height="0.6" radius-bottom="0.25" color="#22d3ee" position="0 2.5 0" rotation="180 0 0" animation="property: position; to: 0 2.2 0; dir: alternate; dur: 1000; loop: true"></a-cone>
            <a-text id="marker-label" value="" align="center" position="0 3.2 0" scale="2.5 2.5 2.5" color="#ffffff"></a-text>
        </a-entity>

        <a-entity id="rig" position="0 1.6 0">
            <a-entity camera look-controls wasd-controls="acceleration: 20"></a-entity>
        </a-entity>

        <a-light type="ambient" color="#fff"></a-light>
    </a-scene>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Config stays the same
        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const mapData = {
            "entrance": { name: "Entrance", x: 0, z: 0 },
            "s1": { name: "S1 Conference", x: 2.5, z: 9.8 },
            "s8": { name: "S8 IME 3", x: 2.5, z: 81.2 },
            "library": { name: "Library Reserve", x: -2.5, z: 81.2 },
            "n1": { name: "N1 Hydraulic Lab", x: 2.5, z: -93.8 }
        };

        // --- VR VIEW LOGIC ---
        const sceneEl = document.querySelector('a-scene');
        const vrBuilding = document.getElementById('vr-building');

        // Detect when user enters VR Mode
        sceneEl.addEventListener('enter-vr', () => {
            vrBuilding.setAttribute('visible', 'true');
            // Hide the AR camera feed for full VR immersion
            document.getElementById('arjs-video').style.display = 'none';
        });

        // Detect when user exits VR Mode
        sceneEl.addEventListener('exit-vr', () => {
            vrBuilding.setAttribute('visible', 'false');
            document.getElementById('arjs-video').style.display = 'block';
        });

        // Navigation Logic (Unchanged but adapted for Rig)
        const startNav = async (endId) => {
            const startId = document.getElementById('start-node').value;
            const start = mapData[startId];
            const end = mapData[endId];
            if(!end) return;

            const xDiff = end.x - start.x;
            const zDiff = end.z - start.z;

            // Update path markers
            const dotContainer = document.getElementById('path-dots');
            dotContainer.innerHTML = '';
            for(let i=1; i<=8; i++) {
                const ratio = i / 9;
                const dot = document.createElement('a-sphere');
                dot.setAttribute('position', `${start.x + (xDiff * ratio)} 0.1 ${start.z + (zDiff * ratio)}`);
                dot.setAttribute('radius', '0.15');
                dot.setAttribute('color', '#22d3ee');
                dotContainer.appendChild(dot);
            }

            const marker = document.getElementById('destination-marker');
            marker.setAttribute('position', `${end.x} 0 ${end.z}`);
            marker.setAttribute('visible', 'true');
            document.getElementById('marker-label').setAttribute('value', end.name.toUpperCase());

            await addDoc(collection(db, "NavLogs"), { from: start.name, to: end.name, type: "VR/AR", timestamp: serverTimestamp() });
        };

        document.getElementById('go-btn').onclick = () => {
            const val = document.getElementById('end-node').value;
            if(val) startNav(val);
        };

        // Populate and other features...
        const populateList = () => {
            const sGroup = document.getElementById('s-group');
            const nGroup = document.getElementById('n-group');
            for (let id in mapData) {
                let opt = `<option value="${id}">${mapData[id].name}</option>`;
                id.startsWith('n') ? nGroup.innerHTML += opt : sGroup.innerHTML += opt;
            }
        };
        populateList();
    </script>
</body>
</html>
