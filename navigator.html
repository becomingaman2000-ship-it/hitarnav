<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body,html{
margin:0;padding:0;width:100%;height:100%;
overflow:hidden;background:transparent;
}

/* CAMERA */
#arjs-video{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* VR BUTTON ONLY */
.a-enter-vr-button{
background:rgba(0,0,0,0.6)!important;
border-radius:12px!important;
right:15px!important;
}

/* REMOVE WHITE VR PANEL */
.a-enter-vr-modal,
.a-enter-vr-overlay{
display:none !important;
}

/* UI LAYER */
.ui-layer{
position:fixed;
inset:0;
z-index:10;
pointer-events:none;
}

.interactive{
pointer-events:auto;
}

/* TOP PANEL */
.top-bar{
position:absolute;
top:0;
left:0;
right:0;
padding:12px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
color:white;
}

/* BOTTOM PANEL */
.bottom-bar{
position:absolute;
bottom:0;
left:0;
right:0;
padding:16px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
color:white;
}

/* BUTTONS */
.btn{
padding:10px;
border-radius:10px;
background:#22d3ee;
color:black;
font-weight:bold;
text-align:center;
}

.btn-danger{
background:#ef4444;
color:white;
}

.btn-dark{
background:#111;
color:white;
border:1px solid #333;
}

.ai-wave{
background:linear-gradient(90deg,#22d3ee,#0891b2,#22d3ee);
animation:wave 2s linear infinite;
}
@keyframes wave{
0%{background-position:0%}
100%{background-position:200%}
}

</style>
</head>

<body>

<!-- UI -->
<div class="ui-layer">

<!-- TOP PANEL -->
<div class="top-bar interactive">
<div class="flex justify-between items-center">

<button id="back-btn" class="btn btn-danger">Back</button>

<div class="text-sm text-center flex-1 px-2">
<div><b>From:</b> <span id="current-location">Detecting...</span></div>
<div><b>To:</b> <span id="destination-name">Not selected</span></div>
</div>

<button id="voice-btn" class="btn">🎤</button>

</div>
</div>

<!-- BOTTOM PANEL -->
<div class="bottom-bar interactive">

<select id="end-node" class="w-full p-2 rounded bg-black text-white mb-2"></select>

<button id="go-btn" class="btn w-full mb-2 ai-wave">
Start Navigation
</button>

</div>

</div>

<!-- AR SCENE -->
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: true">

<a-sphere id="marker" radius="0.4" color="#22d3ee" visible="false"></a-sphere>
<a-text id="label" align="center" color="#fff" visible="false"></a-text>

<a-cone id="arrow" radius-bottom="0.2" height="0.6" color="#22d3ee" visible="false"></a-cone>

<a-entity id="path"></a-entity>

<a-entity camera></a-entity>

</a-scene>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"hit-navigator-56b2b.firebaseapp.com",
projectId:"hit-navigator-56b2b"
});
const db = getFirestore(app);

// MAP
const mapData = {
"s1": { name:"S1 Conference Room", x:2.5, z:9.8 },
"s2": { name:"S2 CS Lab", x:2.5, z:18.2 },
"s8": { name:"S8 IME 3", x:2.5, z:81.2 },
"library": { name:"Library Reserve", x:-2.5, z:81.2 },
"n1": { name:"N1 Hydraulic Lab", x:2.5, z:-93.8 }
};

// VOICE
const synth = window.speechSynthesis;
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

function speak(text){
synth.speak(new SpeechSynthesisUtterance(text));
}

// GPS
const anchor = { lat:-17.8252, lng:31.0335 };

let smoothX=0, smoothZ=0;

navigator.geolocation.watchPosition(pos=>{
const scale=111139;

const rawX=(pos.coords.longitude-anchor.lng)*scale;
const rawZ=-(pos.coords.latitude-anchor.lat)*scale;

smoothX+=(rawX-smoothX)*0.12;
smoothZ+=(rawZ-smoothZ)*0.12;

document.getElementById("current-location").innerText =
smoothX.toFixed(1)+", "+smoothZ.toFixed(1);

if(navigationActive){
updateNavigation();
}

});

// PATH
function drawPath(x,z){
const path=document.getElementById("path");
path.innerHTML="";
for(let i=1;i<=12;i++){
const r=i/12;
const dot=document.createElement("a-sphere");
dot.setAttribute("radius","0.1");
dot.setAttribute("color","#22d3ee");
dot.setAttribute("position",`${x*r} 0 ${z*r}`);
path.appendChild(dot);
}
}

// TURN
function getTurnInstruction(x,z){
const angle=Math.atan2(x,z)*(180/Math.PI);
if(angle>20) return "Turn right";
if(angle<-20) return "Turn left";
return "Go straight";
}

// NAV STATE
let currentRoute=[];
let currentIndex=0;
let navigationActive=false;
let destinationId=null;

// START NAV
function startNav(id){

destinationId=id;
document.getElementById("destination-name").innerText = mapData[id].name;

currentRoute=[{...mapData["s1"]}, mapData[id]];
currentIndex=0;
navigationActive=true;

updateNavigation();
}

// UPDATE NAV
function updateNavigation(){

if(currentIndex >= currentRoute.length-1){
speak("You have arrived");
navigationActive=false;
return;
}

const start=currentRoute[currentIndex];
const end=currentRoute[currentIndex+1];

const dx=end.x - smoothX;
const dz=end.z - smoothZ;

const marker=document.getElementById("marker");
const label=document.getElementById("label");
const arrow=document.getElementById("arrow");

marker.setAttribute("position",`${dx} 0 ${dz}`);
marker.setAttribute("visible",true);

label.setAttribute("value","Navigating");
label.setAttribute("position",`${dx} 1.5 ${dz}`);
label.setAttribute("visible",true);

const angle=Math.atan2(dx,dz)*(180/Math.PI);
arrow.setAttribute("rotation",`0 ${angle} 0`);
arrow.setAttribute("position","0 0 -1");
arrow.setAttribute("visible",true);

drawPath(dx,dz);

const dist=Math.sqrt(
Math.pow(end.x - smoothX,2)+
Math.pow(end.z - smoothZ,2)
);

const stepDist=Math.sqrt(
Math.pow(end.x - start.x,2)+
Math.pow(end.z - start.z,2)
).toFixed(1);

const turn=getTurnInstruction(end.x - start.x, end.z - start.z);

if(dist < 6 && !window._spoken){
speak(`${turn} and walk ${stepDist} meters`);
window._spoken=true;
}

if(dist > 8){
window._spoken=false;
}

if(dist < 3){
currentIndex++;
window._spoken=false;
updateNavigation();
}

}

// UI
const select=document.getElementById("end-node");

for(let id in mapData){
const opt=document.createElement("option");
opt.value=id;
opt.textContent=mapData[id].name;
select.appendChild(opt);
}

document.getElementById("go-btn").onclick=()=>{
if(select.value) startNav(select.value);
};

document.getElementById("back-btn").onclick=()=>{
navigationActive=false;
currentIndex=0;

document.getElementById("marker").setAttribute("visible",false);
document.getElementById("label").setAttribute("visible",false);
document.getElementById("arrow").setAttribute("visible",false);

speak("Navigation stopped");
};

document.getElementById("voice-btn").onclick=()=>{
recognition.start();
};

recognition.onresult=(e)=>{
const text=e.results[0][0].transcript.toLowerCase();

for(let id in mapData){
if(text.includes(id) || text.includes(mapData[id].name.toLowerCase())){
select.value=id;
startNav(id);
return;
}
}

speak("Location not found");
};

</script>

</body>
</html>
