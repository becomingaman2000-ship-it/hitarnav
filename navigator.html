<!DOCTYPE html>
<html>
<head>
    <title>AR Navigator</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #exit-btn { position: fixed; top: 20px; left: 20px; z-index: 5000; background: #ff3b30; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; }
        #nav-ui { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); width: 85%; background: white; z-index: 5000; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <button id="exit-btn" onclick="location.href='dashboard.html'">✕ EXIT</button>

    <div id="nav-ui">
        <select id="dest" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px;">
            <option value="">Where to?</option>
            <option value="S1 Conference">S1 Conference Room</option>
            <option value="N1 Hydraulic">N1 Hydraulic Lab</option>
            <option value="Library">Library</option>
        </select>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-sphere id="marker" radius="0.5" color="#00ffcc" visible="false" position="0 -1 -5" animation="property: position; to: 0 -0.5 -5; dir: alternate; loop: true"></a-sphere>
        <a-entity camera></a-entity>
    </a-scene>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('dest').onchange = async (e) => {
            const dest = e.target.value;
            const email = localStorage.getItem('hit_user_email') || "Guest";
            
            if(!dest) return;
            document.getElementById('marker').setAttribute('visible', 'true');

            // Log the tracking data
            await addDoc(collection(db, "NavigationLogs"), {
                email: email,
                destination: dest,
                timestamp: serverTimestamp(),
                role: localStorage.getItem('hit_user_role') || 'guest'
            });
        };
    </script>
</body>
</html>
