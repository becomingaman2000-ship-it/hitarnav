<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body,html{
margin:0;padding:0;width:100%;height:100%;
overflow:hidden;background:transparent;
}

#arjs-video{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.a-enter-vr-button{
background:rgba(0,0,0,0.6)!important;
border-radius:12px!important;
right:15px!important;
}

.ui-layer{z-index:10;pointer-events:none}
.interactive{pointer-events:auto}

/* MAP OVERLAY */
#mapOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0a;
display:none;
z-index:50;
}

#mapCanvas{
width:100%;
height:100%;
}

/* BUTTON */
.map-btn{
position:absolute;
top:80px;
right:10px;
z-index:20;
padding:10px;
background:#22d3ee;
border-radius:10px;
font-weight:bold;
}

/* CLOSE BUTTON */
.close-map{
position:absolute;
top:20px;
right:20px;
z-index:60;
padding:10px;
background:red;
color:white;
border-radius:10px;
}

.ai-wave{
background:linear-gradient(90deg,#22d3ee,#0891b2,#22d3ee);
animation:wave 2s linear infinite;
}
@keyframes wave{
0%{background-position:0%}
100%{background-position:200%}
}
</style>
</head>

<body>

<!-- MAP BUTTON -->
<button class="map-btn interactive" id="map-btn">🗺️ 2D Map</button>

<!-- MAP OVERLAY -->
<div id="mapOverlay">
<button class="close-map" id="close-map">Close</button>
<canvas id="mapCanvas"></canvas>
</div>

<!-- UI -->
<div class="ui-layer fixed inset-0 flex flex-col justify-end p-6">
<div class="interactive">

<select id="end-node" class="bg-black text-white p-3 rounded-xl w-full"></select>

<button id="go-btn" class="ai-wave w-full py-3 mt-2 text-white rounded-xl">
Start Navigation
</button>

</div>
</div>

<!-- AR SCENE -->
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: true">

<a-sphere id="marker" radius="0.4" color="#22d3ee" visible="false"></a-sphere>
<a-text id="label" align="center" color="#fff" visible="false"></a-text>

<a-cone id="arrow" radius-bottom="0.2" height="0.6" color="#22d3ee" visible="false"></a-cone>

<a-entity id="path"></a-entity>

<a-entity camera></a-entity>

</a-scene>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"hit-navigator-56b2b.firebaseapp.com",
projectId:"hit-navigator-56b2b"
});
const db = getFirestore(app);

// MAP DATA
const mapData = {
"s1": { name:"S1 Conference Room", x:2.5, z:9.8 },
"s2": { name:"S2 CS Lab", x:2.5, z:18.2 },
"s8": { name:"S8 IME 3", x:2.5, z:81.2 },
"library": { name:"Library Reserve", x:-2.5, z:81.2 },
"n1": { name:"N1 Hydraulic Lab", x:2.5, z:-93.8 }
};

// VOICE
const synth = window.speechSynthesis;
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

function speak(text){
synth.speak(new SpeechSynthesisUtterance(text));
}

// GPS
const anchor = { lat:-17.8252, lng:31.0335 };

let smoothX=0, smoothZ=0;
let lastHeading = 0;

navigator.geolocation.watchPosition(pos=>{
const scale=111139;

const rawX=(pos.coords.longitude-anchor.lng)*scale;
const rawZ=-(pos.coords.latitude-anchor.lat)*scale;

const prevX = smoothX;
const prevZ = smoothZ;

smoothX+=(rawX-smoothX)*0.12;
smoothZ+=(rawZ-smoothZ)*0.12;

// heading for 2D arrow
const dx = smoothX - prevX;
const dz = smoothZ - prevZ;
if(Math.abs(dx) > 0.01 || Math.abs(dz) > 0.01){
lastHeading = Math.atan2(dx, dz);
}

document.getElementById("current-location")?.innerText =
smoothX.toFixed(1)+", "+smoothZ.toFixed(1);

if(navigationActive){
updateNavigation();
updateMap();
}

});

// PATH
function drawPath(x,z){
const path=document.getElementById("path");
path.innerHTML="";
for(let i=1;i<=12;i++){
const r=i/12;
const dot=document.createElement("a-sphere");
dot.setAttribute("radius","0.1");
dot.setAttribute("color","#22d3ee");
dot.setAttribute("position",`${x*r} 0 ${z*r}`);
path.appendChild(dot);
}
}

// TURN
function getTurnInstruction(x,z){
const angle=Math.atan2(x,z)*(180/Math.PI);
if(angle>20) return "Turn right";
if(angle<-20) return "Turn left";
return "Go straight";
}

// NAV STATE
let currentRoute=[];
let currentIndex=0;
let navigationActive=false;
let destinationId=null;

// START NAV
function startNav(id){

destinationId=id;

currentRoute=[{...mapData["s1"]}, mapData[id]];
currentIndex=0;
navigationActive=true;

updateNavigation();
}

// UPDATE NAV
async function updateNavigation(){

if(currentIndex >= currentRoute.length-1){
speak("You have arrived");
navigationActive=false;
return;
}

const start=currentRoute[currentIndex];
const end=currentRoute[currentIndex+1];

const dx=end.x - smoothX;
const dz=end.z - smoothZ;

const marker=document.getElementById("marker");
const label=document.getElementById("label");
const arrow=document.getElementById("arrow");

marker.setAttribute("position",`${dx} 0 ${dz}`);
marker.setAttribute("visible",true);

label.setAttribute("value","Navigating");
label.setAttribute("position",`${dx} 1.5 ${dz}`);
label.setAttribute("visible",true);

const angle=Math.atan2(dx,dz)*(180/Math.PI);
arrow.setAttribute("rotation",`0 ${angle} 0`);
arrow.setAttribute("position","0 0 -1");
arrow.setAttribute("visible",true);

drawPath(dx,dz);

const dist=Math.sqrt(
Math.pow(end.x - smoothX,2)+
Math.pow(end.z - smoothZ,2)
);

const stepDist=Math.sqrt(
Math.pow(end.x - start.x,2)+
Math.pow(end.z - start.z,2)
).toFixed(1);

const turn=getTurnInstruction(end.x - start.x, end.z - start.z);

if(dist < 6 && !window._spoken){
const instruction = `${turn} and walk ${stepDist} meters`;
speak(instruction);

window._spoken=true;

await addDoc(collection(db,"NavLogs"),{
destination: mapData[destinationId].name,
instruction,
timestamp: serverTimestamp()
});
}

if(dist > 8){
window._spoken=false;
}

if(dist < 3){
currentIndex++;
window._spoken=false;
updateNavigation();
}

}

// =====================
// 2D MAP LOGIC
// =====================
const mapOverlay = document.getElementById("mapOverlay");
const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");

document.getElementById("map-btn").onclick=()=>{
mapOverlay.style.display="block";
resizeCanvas();
};

document.getElementById("close-map").onclick=()=>{
mapOverlay.style.display="none";
};

function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

function updateMap(){
if(mapOverlay.style.display !== "block") return;

ctx.clearRect(0,0,canvas.width,canvas.height);

// center scaling
const scale = 2;

// draw destination
if(destinationId){
const dest = mapData[destinationId];

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(canvas.width/2 + dest.x*scale, canvas.height/2 + dest.z*scale, 8,0,Math.PI*2);
ctx.fill();
}

// draw user (green arrow)
ctx.save();
ctx.translate(canvas.width/2 + smoothX*scale, canvas.height/2 + smoothZ*scale);
ctx.rotate(lastHeading);

ctx.fillStyle="lime";
ctx.beginPath();
ctx.moveTo(0,-10);
ctx.lineTo(6,10);
ctx.lineTo(-6,10);
ctx.closePath();
ctx.fill();

ctx.restore();
}

// UI
const select=document.getElementById("end-node");

for(let id in mapData){
const opt=document.createElement("option");
opt.value=id;
opt.textContent=mapData[id].name;
select.appendChild(opt);
}

document.getElementById("go-btn").onclick=()=>{
if(select.value) startNav(select.value);
};

document.getElementById("back-btn")?.addEventListener("click",()=>{
navigationActive=false;
});

document.getElementById("voice-btn")?.addEventListener("click",()=>{
recognition.start();
});

recognition.onresult=(e)=>{
const text=e.results[0][0].transcript.toLowerCase();

for(let id in mapData){
if(text.includes(id) || text.includes(mapData[id].name.toLowerCase())){
select.value=id;
startNav(id);
return;
}
}

speak("Location not found");
};

</script>

</body>
</html>
