<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:transparent;}

#arjs-video{
position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;
}

.a-enter-vr-button{
background:rgba(0,0,0,0.6)!important;border-radius:12px!important;right:15px!important;
}

.a-enter-vr-modal,.a-enter-vr-overlay{display:none !important;}

.ui-layer{position:fixed;inset:0;z-index:10;pointer-events:none;}
.interactive{pointer-events:auto;}

.top-bar{
position:absolute;top:0;left:0;right:0;padding:12px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);color:white;
}

.bottom-bar{
position:absolute;bottom:0;left:0;right:0;padding:16px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);color:white;
}

.btn{padding:10px;border-radius:10px;background:#22d3ee;color:black;font-weight:bold;text-align:center;}
.btn-danger{background:#ef4444;color:white;}
.btn-dark{background:#111;color:white;border:1px solid #333;}

.ai-wave{background:linear-gradient(90deg,#22d3ee,#0891b2,#22d3ee);animation:wave 2s linear infinite;}
@keyframes wave{0%{background-position:0%}100%{background-position:200%}}

#mapOverlay{
position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:none;z-index:50;
}

#mapCanvas{width:100%;height:100%;}

</style>
</head>

<body>

<div class="ui-layer">

<div class="top-bar interactive flex justify-between items-center">
<button id="back-btn" class="btn btn-danger">Back</button>

<div class="text-sm text-center flex-1 px-2">
<div><b>From:</b> <span id="current-location">Detecting...</span></div>
<div><b>To:</b> <span id="destination-name">Not selected</span></div>
</div>

<div class="flex gap-2">
<button id="voice-btn" class="btn">🎤</button>
<button id="map-btn" class="btn btn-dark">🗺️</button>
</div>
</div>

<div class="bottom-bar interactive">
<select id="end-node" class="w-full p-2 rounded bg-black text-white mb-2"></select>
<button id="go-btn" class="btn w-full ai-wave">Start Navigation</button>
</div>

</div>

<div id="mapOverlay">
<button id="close-map" class="btn btn-danger" style="position:absolute;top:20px;right:20px;z-index:60;">Close</button>
<canvas id="mapCanvas"></canvas>
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: true">

<a-sphere id="marker" radius="0.06" color="#22d3ee" visible="false"></a-sphere>
<a-text id="label" align="center" color="#fff" visible="false"></a-text>
<a-cone id="arrow" radius-bottom="0.02" height="0.06" color="#22d3ee" visible="false"></a-cone>
<a-entity id="path"></a-entity>
<a-entity camera></a-entity>

</a-scene>

<script type="module">

// MAP DATA (20+ ROOMS)
const mapData = {
"s1": { name:"S1 Conference Room", x:2.5, z:9.8 },
"s2": { name:"S2 CS Lab", x:2.5, z:18.2 },
"s3": { name:"S3 SME Lab 1", x:2.5, z:26.6 },
"s4": { name:"S4 SME Lab 2", x:2.5, z:42.0 },
"s5": { name:"S5 FPT 4", x:2.5, z:50.4 },
"s6": { name:"S6 FE 4", x:2.5, z:58.8 },
"s7": { name:"S7 CS 4", x:2.5, z:74.2 },
"s8": { name:"S8 IME 3", x:2.5, z:81.2 },
"library": { name:"Library Reserve", x:-2.5, z:81.2 },
"s10a": { name:"Chairman Office", x:-2.5, z:70.0 },
"s10b": { name:"Electronic Commerce Office", x:-2.5, z:74.2 },
"s13b": { name:"Chairman FE Office", x:-2.5, z:58.8 },
"s14": { name:"TDC Office", x:-2.5, z:50.4 },
"s15b": { name:"Chairman TDC", x:-2.5, z:42.0 },
"s16": { name:"Director Tech Centre", x:-2.5, z:9.8 },
"n6": { name:"N6 Pharmacy", x:-2.5, z:-38.5 },
"n7": { name:"N7 FPT Lab", x:-2.5, z:-46.2 },
"n8": { name:"N8 FPT Lab 2", x:-2.5, z:-62.3 },
"n9": { name:"N9 FE 1", x:-2.5, z:-70.0 },
"n10": { name:"N10 Analytic Lab", x:2.5, z:-70.0 },
"n11": { name:"N11 Pharmaceutical Lab", x:2.5, z:-62.3 },
"n12": { name:"N12 Pneumatic Lab", x:2.5, z:-46.2 },
"n2": { name:"N2 Bio Tech Lab", x:2.5, z:-86.1 },
"n1": { name:"N1 Hydraulic Lab", x:2.5, z:-93.8 }
};

const synth = window.speechSynthesis;
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

function speak(t){synth.speak(new SpeechSynthesisUtterance(t));}

const anchor = { lat:-17.8252, lng:31.0335 };
let smoothX=0, smoothZ=0;
let lastHeading=0;

let navigationActive=false;
let destinationId=null;
let currentRoute=[];
let currentIndex=0;

// MAP UI
const mapOverlay=document.getElementById("mapOverlay");
const canvas=document.getElementById("mapCanvas");
const ctx=canvas.getContext("2d");

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}

// UI BUTTONS
document.getElementById("map-btn").onclick=()=>{mapOverlay.style.display="block";resizeCanvas();};
document.getElementById("close-map").onclick=()=>{mapOverlay.style.display="none";};

// GPS
navigator.geolocation.watchPosition(pos=>{
const scale=111139;
const rawX=(pos.coords.longitude-anchor.lng)*scale;
const rawZ=-(pos.coords.latitude-anchor.lat)*scale;

const prevX=smoothX;
const prevZ=smoothZ;

smoothX+=(rawX-smoothX)*0.12;
smoothZ+=(rawZ-smoothZ)*0.12;

const dx=smoothX-prevX;
const dz=smoothZ-prevZ;
if(Math.abs(dx)>0.01||Math.abs(dz)>0.01){lastHeading=Math.atan2(dx,dz);}

if(navigationActive){updateNavigation();updateMap();}

});

function drawPath(x,z){
const path=document.getElementById("path");
path.innerHTML="";
for(let i=1;i<=12;i++){
const r=i/12;
const dot=document.createElement("a-sphere");
dot.setAttribute("radius","0.1");
dot.setAttribute("color","#22d3ee");
dot.setAttribute("position",`${x*r} 0 ${z*r}`);
path.appendChild(dot);
}
}

function getTurnInstruction(x,z){
const angle=Math.atan2(x,z)*(180/Math.PI);
if(angle>20) return "Turn right";
if(angle<-20) return "Turn left";
return "Go straight";
}

function startNav(id){
destinationId=id;
document.getElementById("destination-name").innerText=mapData[id].name;
currentRoute=[{...mapData["s1"]},mapData[id]];
currentIndex=0;
navigationActive=true;
updateNavigation();
}

function updateNavigation(){
if(currentIndex>=currentRoute.length-1){speak("You have arrived");navigationActive=false;return;}

const start=currentRoute[currentIndex];
const end=currentRoute[currentIndex+1];

const dx=end.x-smoothX;
const dz=end.z-smoothZ;

const marker=document.getElementById("marker");
const label=document.getElementById("label");
const arrow=document.getElementById("arrow");

marker.setAttribute("position",`${dx} 0 ${dz}`);
marker.setAttribute("visible",true);
label.setAttribute("position",`${dx} 1.5 ${dz}`);
label.setAttribute("visible",true);
arrow.setAttribute("rotation",`0 ${Math.atan2(dx,dz)*(180/Math.PI)} 0`);
arrow.setAttribute("visible",true);

drawPath(dx,dz);

const dist=Math.sqrt(Math.pow(end.x-smoothX,2)+Math.pow(end.z-smoothZ,2));
const stepDist=Math.sqrt(Math.pow(end.x-start.x,2)+Math.pow(end.z-start.z,2)).toFixed(1);
const turn=getTurnInstruction(end.x-start.x,end.z-start.z);

if(dist<6 && !window._spoken){speak(turn+" and walk "+stepDist+" meters");window._spoken=true;}
if(dist>8){window._spoken=false;}
if(dist<3){currentIndex++;window._spoken=false;updateNavigation();}
}

// 2D MAP
function updateMap(){
if(mapOverlay.style.display!=="block") return;
ctx.clearRect(0,0,canvas.width,canvas.height);
const scale=2;

if(destinationId){
const d=mapData[destinationId];
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(canvas.width/2+d.x*scale,canvas.height/2+d.z*scale,8,0,Math.PI*2);
ctx.fill();
}

ctx.save();
ctx.translate(canvas.width/2+smoothX*scale,canvas.height/2+smoothZ*scale);
ctx.rotate(lastHeading);
ctx.fillStyle="lime";
ctx.beginPath();
ctx.moveTo(0,-10);
ctx.lineTo(6,10);
ctx.lineTo(-6,10);
ctx.closePath();
ctx.fill();
ctx.restore();
}

// UI POPULATE
const select=document.getElementById("end-node");
for(let id in mapData){
const opt=document.createElement("option");
opt.value=id;
opt.textContent=mapData[id].name;
select.appendChild(opt);
}

document.getElementById("go-btn").onclick=()=>{if(select.value)startNav(select.value);};

document.getElementById("back-btn").onclick=()=>{navigationActive=false;speak("Navigation stopped");};

document.getElementById("voice-btn").onclick=()=>recognition.start();

recognition.onresult=(e)=>{
const text=e.results[0][0].transcript.toLowerCase();
for(let id in mapData){
if(text.includes(id)||text.includes(mapData[id].name.toLowerCase())){
select.value=id;startNav(id);return;
}
}
speak("Location not found");
};

</script>

</body>
</html>
