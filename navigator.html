<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIT AR | Master Navigator Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif; }
        #arjs-video { position: fixed !important; top: 0; left: 0; width: 100% !important; height: 100% !important; object-fit: cover !important; z-index: -1 !important; }
        .ui-layer { z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        .ai-wave {
            background: linear-gradient(90deg, #22d3ee, #0891b2, #22d3ee);
            background-size: 200% 200%;
            animation: wave 2s linear infinite;
        }
        @keyframes wave { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .glowing-btn { box-shadow: 0 0 30px rgba(34, 211, 238, 0.5); }
        #map-overlay { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(120%); }
        #map-overlay.active { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="map-overlay" class="fixed inset-x-0 bottom-0 z-[100] p-4 interactive">
        <div class="bg-slate-900/95 backdrop-blur-2xl border-t-2 border-cyan-500 rounded-t-[3rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-cyan-500 rounded-full animate-ping"></div>
                    <h3 class="text-white font-black text-xs uppercase tracking-[0.2em]">Floor 0: Master Blueprint</h3>
                </div>
                <button onclick="document.getElementById('map-overlay').classList.remove('active')" class="bg-white/10 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold">✕</button>
            </div>
            <img src="blueprint.jpeg" class="w-full rounded-[2rem] border border-white/10 mb-4 shadow-inner" alt="Campus Map">
        </div>
    </div>

    <div class="ui-layer fixed inset-0 flex flex-col justify-between p-6">
        
        <div class="flex justify-between items-center interactive">
            <button onclick="location.href='dashboard.html'" class="bg-black/60 backdrop-blur-md text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase border border-white/10 flex items-center gap-2">
                <span class="text-lg">←</span> Back
            </button>
            <button onclick="document.getElementById('map-overlay').classList.add('active')" class="bg-white/10 backdrop-blur-md text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase border border-white/10">
                🗺 Explore Map
            </button>
        </div>

        <div class="space-y-4 interactive">
            
            <div class="bg-black/50 backdrop-blur-2xl p-2 rounded-[2.5rem] border border-white/10 shadow-2xl">
                <div class="flex flex-col gap-1 p-2">
                    <select id="start-node" class="bg-slate-900/90 text-white text-[10px] p-3 mb-1 rounded-2xl outline-none border border-white/5 font-bold">
                        <option>Start: Current Location</option>
                    </select>

                    <select id="end-node" class="bg-slate-800/80 text-white text-[11px] p-3 rounded-2xl outline-none border border-white/5 font-bold">
                        <option value="">Where are we going today?</option>
                        <optgroup label="S-BLOCK">
                            <option value="s1">S1 Conference Room</option>
                            <option value="s2">S2 Computer Science Lab</option>
                            <option value="s3">S3 SME Lab 1</option>
                            <option value="s4">S4 SME Lab 2</option>
                            <option value="s5">S5 FPT 4</option>
                            <option value="s6">S6 FE 4</option>
                            <option value="s7">S7 CS 4</option>
                            <option value="s8">S8 IME 3</option>
                            <option value="s10a">Chairman Office</option>
                            <option value="s10b">Electronic Commerce Office</option>
                            <option value="s13b">Chairman FE Office</option>
                            <option value="s14">TDC Office</option>
                            <option value="s15b">Chairman TDC</option>
                            <option value="s16">Director Tech Centre</option>
                            <option value="library">Library Reserve</option>
                        </optgroup>
                        <optgroup label="N-BLOCK">
                            <option value="n1">N1 Hydraulic Lab</option>
                            <option value="n2">N2 Bio Tech Lab</option>
                            <option value="n3">N3 CPSE Lab</option>
                            <option value="n4">N4 CS 1</option>
                            <option value="n5">N5 IME 1</option>
                            <option value="n6">N6 Proposed Pharmacy</option>
                            <option value="n7">N7 FPT Lab</option>
                            <option value="n8">N8 FPT Lab 2</option>
                            <option value="n9">N9 FE 1</option>
                            <option value="n10">N10 Proposed Analytic Lab</option>
                            <option value="n11">N11 Pharmaceutical Lab</option>
                            <option value="n12">N12 Pneumatic Lab</option>
                        </optgroup>
                    </select>
                    <button id="go-btn" class="ai-wave text-white py-3 mt-1 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg">Activate AR Path</button>
                </div>
            </div>

            <div class="flex flex-col items-center pb-6">
                <div id="voice-trigger" class="glowing-btn w-16 h-16 bg-cyan-500 rounded-full flex items-center justify-center text-2xl shadow-2xl cursor-pointer active:scale-90 transition-transform">
                    🎙️
                </div>
                <div class="mt-4 bg-black/60 backdrop-blur-lg border border-white/10 px-6 py-2 rounded-full text-center max-w-[280px]">
                    <p id="ai-text" class="text-cyan-400 text-[9px] font-black uppercase tracking-tighter">AI Assistant Standing By</p>
                    <p id="ai-status" class="text-white/60 text-[8px] font-medium mt-1">"Take me to the Electronic Commerce Office"</p>
                </div>
            </div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-sphere id="nav-marker" radius="0.4" color="#22d3ee" visible="false" position="0 0 -5" 
                  animation="property: position; to: 0 0.8 -5; dir: alternate; dur: 1200; loop: true"
                  material="emissive: #22d3ee; emissiveIntensity: 2; opacity: 0.8; transparent: true">
        </a-sphere>
        <a-text id="marker-label" value="" align="center" position="0 1.8 -5" scale="2.5 2.5 2.5" font="exo2bold" color="#ffffff" visible="false"></a-text>
        <a-entity camera></a-entity>
    </a-scene>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Comprehensive room list from blueprint
        const rooms = {
            "s1": "S1 Conference Room", "s2": "S2 Computer Science Lab", "s3": "S3 SME Lab 1", "s4": "S4 SME Lab 2",
            "s5": "S5 FPT 4", "s6": "S6 FE 4", "s7": "S7 CS 4", "s8": "S8 IME 3", "s10a": "Chairman Office",
            "s10b": "Electronic Commerce Office", "s13b": "Chairman FE Office", "s14": "TDC Office",
            "s15b": "Chairman TDC", "s16": "Director Tech Centre", "library": "Library Reserve",
            "n1": "N1 Hydraulic Lab", "n2": "N2 Bio Tech Lab", "n3": "N3 CPSE Lab", "n4": "N4 CS 1",
            "n5": "N5 IME 1", "n6": "N6 Proposed Pharmacy", "n7": "N7 FPT Lab", "n8": "N8 FPT Lab 2",
            "n9": "N9 FE 1", "n10": "N10 Proposed Analytic Lab", "n11": "N11 Pharmaceutical Lab", "n12": "N12 Pneumatic Lab"
        };

        const synth = window.speechSynthesis;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        const speak = (text) => {
            const utter = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            utter.voice = voices.find(v => v.lang.includes('en-US')) || voices[0];
            utter.pitch = 1.0;
            utter.rate = 1.0;
            synth.speak(utter);
        };

        const aiBrain = (input) => {
            const query = input.toLowerCase();
            
            for (let id in rooms) {
                if(query.includes(id) || query.includes(rooms[id].toLowerCase())) {
                    document.getElementById('end-node').value = id;
                    startNav(id);
                    speak(`Navigation activated. I am directing you to ${rooms[id]}. Please follow the blue marker.`);
                    return;
                }
            }

            if(query.includes("hello") || query.includes("hi")) {
                speak("Welcome back. I am ready to guide you around the HIT S and N blocks.");
            } else if(query.includes("where am i")) {
                speak("You are currently at the entrance of the ground floor. Choose a destination to begin.");
            } else {
                speak("I couldn't find that specific room. Please mention the room code like N 4 or S 10.");
            }
        };

        const startNav = async (id) => {
            const name = rooms[id];
            if(!name) return;
            document.getElementById('nav-marker').setAttribute('visible', 'true');
            document.getElementById('marker-label').setAttribute('visible', 'true');
            document.getElementById('marker-label').setAttribute('value', name.toUpperCase());
            document.getElementById('ai-text').innerText = "Navigation Active";
            document.getElementById('ai-status').innerText = `Destination: ${name}`;
            
            await addDoc(collection(db, "NavLogs"), {
                userId: localStorage.getItem('hit_user_email') || "Guest",
                destination: name,
                timestamp: serverTimestamp()
            });
        };

        document.getElementById('voice-trigger').onclick = () => {
            recognition.start();
            document.getElementById('ai-text').innerText = "Listening...";
            document.getElementById('voice-trigger').classList.add('animate-pulse');
        };

        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            document.getElementById('ai-status').innerText = `"${transcript}"`;
            aiBrain(transcript);
            document.getElementById('voice-trigger').classList.remove('animate-pulse');
        };

        document.getElementById('go-btn').onclick = () => {
            const val = document.getElementById('end-node').value;
            if(val) startNav(val);
        };
    </script>
</body>
</html>
