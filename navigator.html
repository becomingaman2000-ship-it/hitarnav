<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body,html{
margin:0;padding:0;width:100%;height:100%;
overflow:hidden;background:transparent;
}

#arjs-video{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.a-enter-vr-button{
background:rgba(0,0,0,0.6)!important;
border-radius:12px!important;
right:15px!important;
}

.ui-layer{z-index:10;pointer-events:none}
.interactive{pointer-events:auto}

.ai-wave{
background:linear-gradient(90deg,#22d3ee,#0891b2,#22d3ee);
animation:wave 2s linear infinite;
}
@keyframes wave{
0%{background-position:0%}
100%{background-position:200%}
}
</style>
</head>

<body>

<!-- UI -->
<div class="ui-layer fixed inset-0 flex flex-col justify-end p-6">
<div class="interactive">

<select id="end-node" class="bg-black text-white p-3 rounded-xl w-full"></select>

<button id="go-btn" class="ai-wave w-full py-3 mt-2 text-white rounded-xl">
Start Navigation
</button>

</div>
</div>

<!-- AR SCENE -->
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: true">

<a-sphere id="marker" radius="0.4" color="#22d3ee" visible="false"></a-sphere>
<a-text id="label" align="center" color="#fff" visible="false"></a-text>

<a-cone id="arrow" radius-bottom="0.2" height="0.6" color="#22d3ee" visible="false"></a-cone>

<a-entity id="path"></a-entity>

<a-entity camera></a-entity>

</a-scene>

<script type="module">

// =====================
// FIREBASE
// =====================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"hit-navigator-56b2b.firebaseapp.com",
projectId:"hit-navigator-56b2b"
});
const db = getFirestore(app);

// =====================
// MAP DATA
// =====================
const mapData = {

"s1": { name:"S1 Conference Room", x:2.5, z:9.8 },
"s2": { name:"S2 CS Lab", x:2.5, z:18.2 },
"s3": { name:"S3 SME Lab 1", x:2.5, z:26.6 },
"s4": { name:"S4 SME Lab 2", x:2.5, z:42.0 },
"s5": { name:"S5 FPT 4", x:2.5, z:50.4 },
"s6": { name:"S6 FE 4", x:2.5, z:58.8 },
"s7": { name:"S7 CS 4", x:2.5, z:74.2 },
"s8": { name:"S8 IME 3", x:2.5, z:81.2 },

"library": { name:"Library Reserve", x:-2.5, z:81.2 },
"s10b": { name:"Electronic Commerce Office", x:-2.5, z:74.2 },
"s10a": { name:"Chairman Office", x:-2.5, z:70.0 },
"s13b": { name:"Chairman FE Office", x:-2.5, z:58.8 },
"s14": { name:"TDC Office", x:-2.5, z:50.4 },
"s15b": { name:"Chairman TDC", x:-2.5, z:42.0 },
"s16": { name:"Director Tech Centre", x:-2.5, z:9.8 },

"n6": { name:"N6 Proposed Pharmacy", x:-2.5, z:-38.5 },
"n7": { name:"N7 FPT Lab", x:-2.5, z:-46.2 },
"n8": { name:"N8 FPT Lab 2", x:-2.5, z:-62.3 },
"n9": { name:"N9 FE 1", x:-2.5, z:-70.0 },

"n10": { name:"N10 Proposed Analytic Lab", x:2.5, z:-70.0 },
"n11": { name:"N11 Pharmaceutical Lab", x:2.5, z:-62.3 },
"n12": { name:"N12 Pneumatic Lab", x:2.5, z:-46.2 },
"n2": { name:"N2 Bio Tech Lab", x:2.5, z:-86.1 },
"n1": { name:"N1 Hydraulic Lab", x:2.5, z:-93.8 }
};

// =====================
// WAYPOINT ROUTES
// =====================
const routes = {
"s1-library":[
{x:2.5,z:9.8},
{x:2.5,z:50},
{x:-2.5,z:81.2}
],
"s1-n1":[
{x:2.5,z:9.8},
{x:2.5,z:-40},
{x:2.5,z:-93.8}
]
};

// =====================
// VOICE
// =====================
const synth = window.speechSynthesis;
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

function speak(text){
synth.speak(new SpeechSynthesisUtterance(text));
}

// =====================
// GPS SMOOTHING
// =====================
const anchor = { lat:-17.8252, lng:31.0335 };

let smoothX=0, smoothZ=0;

navigator.geolocation.watchPosition(pos=>{
const scale=111139;

const rawX=(pos.coords.longitude-anchor.lng)*scale;
const rawZ=-(pos.coords.latitude-anchor.lat)*scale;

smoothX+=(rawX-smoothX)*0.12;
smoothZ+=(rawZ-smoothZ)*0.12;

if(navigationActive){
updateNavigation();
}

});

// =====================
// PATH DRAW
// =====================
function drawPath(x,z){
const path=document.getElementById("path");
path.innerHTML="";

for(let i=1;i<=12;i++){
const r=i/12;
const dot=document.createElement("a-sphere");
dot.setAttribute("radius","0.1");
dot.setAttribute("color","#22d3ee");
dot.setAttribute("position",`${x*r} 0 ${z*r}`);
path.appendChild(dot);
}
}

// =====================
// TURN LOGIC
// =====================
function getTurnInstruction(x,z){
const angle=Math.atan2(x,z)*(180/Math.PI);

if(angle>20) return "Turn right";
if(angle<-20) return "Turn left";
return "Go straight";
}

// =====================
// NAV STATE
// =====================
let currentRoute=[];
let currentIndex=0;
let navigationActive=false;
let destinationId=null;

// =====================
// START NAVIGATION
// =====================
function startNav(id){

destinationId=id;

const key=Object.keys(routes).find(r=>r.endsWith(id));

if(key){
currentRoute=routes[key];
}else{
currentRoute=[{...mapData["s1"]}, mapData[id]];
}

currentIndex=0;
navigationActive=true;

updateNavigation();
}

// =====================
// REAL-TIME NAVIGATION
// =====================
function updateNavigation(){

if(currentIndex >= currentRoute.length-1){
speak("You have arrived");
navigationActive=false;
return;
}

const start=currentRoute[currentIndex];
const end=currentRoute[currentIndex+1];

const dx=end.x - smoothX;
const dz=end.z - smoothZ;

const marker=document.getElementById("marker");
const label=document.getElementById("label");
const arrow=document.getElementById("arrow");

// marker
marker.setAttribute("position",`${dx} 0 ${dz}`);
marker.setAttribute("visible",true);

// label
label.setAttribute("value","Navigating");
label.setAttribute("position",`${dx} 1.5 ${dz}`);
label.setAttribute("visible",true);

// arrow
const angle=Math.atan2(dx,dz)*(180/Math.PI);
arrow.setAttribute("rotation",`0 ${angle} 0`);
arrow.setAttribute("position","0 0 -1");
arrow.setAttribute("visible",true);

// path
drawPath(dx,dz);

// distance to waypoint
const dist=Math.sqrt(
Math.pow(end.x - smoothX,2)+
Math.pow(end.z - smoothZ,2)
);

// step distance
const stepDist=Math.sqrt(
Math.pow(end.x - start.x,2)+
Math.pow(end.z - start.z,2)
).toFixed(1);

// turn instruction
const turn=getTurnInstruction(end.x - start.x, end.z - start.z);

// voice throttling
if(dist < 6 && !window._spoken){
speak(`${turn} and walk ${stepDist} meters`);
window._spoken=true;
}

if(dist > 8){
window._spoken=false;
}

// waypoint reached
if(dist < 3){
currentIndex++;
window._spoken=false;
updateNavigation();
}

}

// =====================
// UI
// =====================
const select=document.getElementById("end-node");

for(let id in mapData){
const opt=document.createElement("option");
opt.value=id;
opt.textContent=mapData[id].name;
select.appendChild(opt);
}

document.getElementById("go-btn").onclick=()=>{
if(select.value) startNav(select.value);
};

// =====================
// VOICE INPUT
// =====================
document.body.addEventListener("dblclick",()=>recognition.start());

recognition.onresult=(e)=>{
const text=e.results[0][0].transcript.toLowerCase();

for(let id in mapData){
if(text.includes(id) || text.includes(mapData[id].name.toLowerCase())){
select.value=id;
startNav(id);
return;
}
}

speak("Location not found");
};

</script>

</body>
</html>
