<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIT VR | Real-time Collision Nav</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui-panel { pointer-events: none; position: fixed; inset: 0; z-index: 999; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .interactive { pointer-events: auto; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div class="flex justify-between items-start interactive">
            <button onclick="location.href='dashboard.html'" class="bg-black/80 text-white p-3 rounded-2xl font-black text-[10px] uppercase border border-white/20">✕ Exit</button>
            
            <div class="flex flex-col gap-2 items-end">
                <div class="bg-cyan-950/90 p-3 rounded-2xl border border-cyan-400/30 text-right">
                    <p id="ai-status" class="text-[9px] font-black uppercase text-cyan-400">VR System Active</p>
                    <p id="pos-display" class="text-[10px] text-white font-mono">Pos: 0, 0, 0</p>
                </div>
                <button id="toggle-vr" class="bg-white text-black px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-xl">Switch to 3D VR</button>
            </div>
        </div>

        <div class="flex flex-col items-center interactive mb-6">
            <div id="voice-trigger" class="w-16 h-16 bg-cyan-500 rounded-full flex items-center justify-center text-2xl shadow-2xl mb-4">🎙️</div>
            <p class="text-white text-[9px] font-black uppercase tracking-widest bg-black/40 px-4 py-1 rounded-full">Use On-Screen Joysticks to Walk</p>
        </div>
    </div>

    <a-scene embedded physics="debug: false; gravity: -9.8" renderer="antialias: true">
        
        <a-assets>
            <a-asset-item id="hit-model" src="assets/hit_ground_floor.glb"></a-asset-item>
        </a-assets>

        <a-entity id="rig" movement-controls="constrainToNavMesh: true; speed: 0.2" position="0 0 0">
            <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: true">
                <a-cursor color="#22d3ee" fuse="false"></a-cursor>
            </a-entity>
        </a-entity>

        <a-entity id="building-model" 
                  gltf-model="#hit-model" 
                  position="0 0 0" 
                  scale="1 1 1"
                  static-body
                  visible="false"> </a-entity>

        <a-grid static-body material="opacity: 0.2; transparent: true"></a-grid>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 4 3" intensity="0.5"></a-light>

    </a-scene>

    <script>
        const vrBtn = document.getElementById('toggle-vr');
        const building = document.getElementById('building-model');
        const scene = document.querySelector('a-scene');
        let isVR = false;

        // Toggle between AR (Camera) and VR (3D Model)
        vrBtn.onclick = () => {
            isVR = !isVR;
            if (isVR) {
                // VR MODE
                building.setAttribute('visible', 'true');
                scene.setAttribute('arjs', 'sourceType: dummy'); // Stop webcam
                vrBtn.innerText = "Switch to AR View";
                vrBtn.classList.replace('bg-white', 'bg-cyan-500');
                vrBtn.classList.add('text-white');
            } else {
                // AR MODE
                building.setAttribute('visible', 'false');
                scene.setAttribute('arjs', 'sourceType: webcam'); // Start webcam
                vrBtn.innerText = "Switch to 3D VR";
                vrBtn.classList.replace('bg-cyan-500', 'bg-white');
                vrBtn.classList.remove('text-white');
            }
        };

        // Real-time Position Tracking for the "Chairman" display
        const rig = document.getElementById('rig');
        const posDisplay = document.getElementById('pos-display');
        
        setInterval(() => {
            const pos = rig.getAttribute('position');
            posDisplay.innerText = `X: ${pos.x.toFixed(1)} Y: ${pos.y.toFixed(1)} Z: ${pos.z.toFixed(1)}`;
        }, 100);

        // Voice Logic integration
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        document.getElementById('voice-trigger').onclick = () => recognition.start();
        
        recognition.onresult = (event) => {
            const cmd = event.results[0][0].transcript.toLowerCase();
            if(cmd.includes("teleport to s 2")) {
                rig.setAttribute('position', '10 0 -5'); // Jump to S2 coordinates
            }
        };
    </script>
</body>
</html>
