<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIT AR | Master Navigator Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: 'Inter', sans-serif; }
        #arjs-video { position: fixed !important; top: 0; left: 0; width: 100% !important; height: 100% !important; object-fit: cover !important; z-index: -1 !important; }
        .ui-layer { z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .ai-wave { background: linear-gradient(90deg, #22d3ee, #0891b2, #22d3ee); background-size: 200% 200%; animation: wave 2s linear infinite; }
        @keyframes wave { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .glowing-btn { box-shadow: 0 0 30px rgba(34, 211, 238, 0.5); }
        #map-overlay { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(120%); }
        #map-overlay.active { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="map-overlay" class="fixed inset-x-0 bottom-0 z-[100] p-4 interactive">
        <div class="bg-slate-900/95 backdrop-blur-2xl border-t-2 border-cyan-500 rounded-t-[3rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-cyan-500 rounded-full animate-ping"></div>
                    <h3 class="text-white font-black text-xs uppercase tracking-[0.2em]">Floor 0: Master Blueprint</h3>
                </div>
                <button onclick="document.getElementById('map-overlay').classList.remove('active')" class="bg-white/10 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold">✕</button>
            </div>
            <img src="blueprint.jpeg" class="w-full rounded-[2rem] border border-white/10 mb-4 shadow-inner" alt="Campus Map">
        </div>
    </div>

    <div class="ui-layer fixed inset-0 flex flex-col justify-between p-6">
        <div class="flex justify-between items-center interactive">
            <button onclick="location.href='dashboard.html'" class="bg-black/60 backdrop-blur-md text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase border border-white/10 flex items-center gap-2">
                <span class="text-lg">←</span> Back
            </button>
            <button onclick="document.getElementById('map-overlay').classList.add('active')" class="bg-white/10 backdrop-blur-md text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase border border-white/10">
                🗺 Explore Map
            </button>
        </div>

        <div class="space-y-4 interactive">
            <div class="bg-black/50 backdrop-blur-2xl p-2 rounded-[2.5rem] border border-white/10 shadow-2xl">
                <div class="flex flex-col gap-1 p-2">
                    <select id="end-node" class="bg-slate-800/80 text-white text-[11px] p-3 rounded-2xl outline-none border border-white/5 font-bold">
                        <option value="">Where are we going today?</option>
                        <optgroup label="S-BLOCK (West Side)">
                            <option value="library">Library Reserve</option>
                            <option value="s10b">E-Commerce Office</option>
                            <option value="s10a">Chairman Office</option>
                            <option value="s16">Director Tech Centre</option>
                        </optgroup>
                        <optgroup label="S-BLOCK (East Side)">
                            <option value="s1">S1 Conference Room</option>
                            <option value="s2">S2 CS Lab</option>
                            <option value="s8">S8 IME 3</option>
                        </optgroup>
                        <optgroup label="N-BLOCK">
                            <option value="n4">N4 CS 1</option>
                            <option value="n12">N12 Pneumatic Lab</option>
                            <option value="n1">N1 Hydraulic Lab</option>
                        </optgroup>
                    </select>
                    <button id="go-btn" class="ai-wave text-white py-3 mt-1 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg">Activate AR Path</button>
                </div>
            </div>

            <div class="flex flex-col items-center pb-6">
                <div id="voice-trigger" class="glowing-btn w-16 h-16 bg-cyan-500 rounded-full flex items-center justify-center text-2xl shadow-2xl cursor-pointer active:scale-90 transition-transform">
                    🎙️
                </div>
                <div class="mt-4 bg-black/60 backdrop-blur-lg border border-white/10 px-6 py-2 rounded-full text-center max-w-[280px]">
                    <p id="ai-text" class="text-cyan-400 text-[9px] font-black uppercase tracking-tighter">AI Assistant Standing By</p>
                    <p id="ai-status" class="text-white/60 text-[8px] font-medium mt-1">Try "Take me to the Library"</p>
                </div>
            </div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-sphere id="nav-marker" radius="0.5" color="#22d3ee" visible="false" 
                  animation="property: position; to: 0 1.2 0; dir: alternate; dur: 1000; loop: true"
                  material="emissive: #22d3ee; emissiveIntensity: 2; opacity: 0.9; transparent: true">
        </a-sphere>
        <a-text id="marker-label" value="" align="center" position="0 2.2 0" scale="2.5 2.5 2.5" font="exo2bold" color="#ffffff" visible="false"></a-text>
        <a-entity camera></a-entity>
    </a-scene>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- STEP-CALIBRATED MESH DATA ---
        // 1 step = 0.7m. Z-axis: S-Block is +, N-Block is -. X-axis: East side is +, West side is -.
        const mapData = {
            // S-BLOCK EAST SIDE (Right)
            "s1": { name: "S1 Conference Room", x: 2.5, z: 9.8 },
            "s2": { name: "S2 CS Lab", x: 2.5, z: 18.2 },
            "s3": { name: "S3 SME Lab 1", x: 2.5, z: 26.6 },
            "s4": { name: "S4 SME Lab 2", x: 2.5, z: 42.0 },
            "s5": { name: "S5 FPT 4", x: 2.5, z: 50.4 },
            "s6": { name: "S6 FE 4", x: 2.5, z: 58.8 },
            "s7": { name: "S7 CS 4", x: 2.5, z: 74.2 },
            "s8": { name: "S8 IME 3", x: 2.5, z: 81.2 },

            // S-BLOCK WEST SIDE (Left - Mirrored)
            "library": { name: "Library Reserve", x: -2.5, z: 81.2 },
            "s10b": { name: "Electronic Commerce Office", x: -2.5, z: 74.2 },
            "s10a": { name: "Chairman Office", x: -2.5, z: 70.0 }, // Estimated door position
            "s13b": { name: "Chairman FE Office", x: -2.5, z: 58.8 },
            "s14": { name: "TDC Office", x: -2.5, z: 50.4 },
            "s15b": { name: "Chairman TDC", x: -2.5, z: 42.0 },
            "s16": { name: "Director Tech Centre", x: -2.5, z: 9.8 },

            // N-BLOCK WEST SIDE (Left)
            "n6": { name: "N6 Proposed Pharmacy", x: -2.5, z: -38.5 }, // 33 + 22 steps from S-passage
            "n7": { name: "N7 FPT Lab", x: -2.5, z: -46.2 },
            "n8": { name: "N8 FPT Lab 2", x: -2.5, z: -62.3 },
            "n9": { name: "N9 FE 1", x: -2.5, z: -70.0 },

            // N-BLOCK EAST SIDE (Right - Mirrored)
            "n10": { name: "N10 Proposed Analytic Lab", x: 2.5, z: -70.0 },
            "n11": { name: "N11 Pharmaceutical Lab", x: 2.5, z: -62.3 },
            "n12": { name: "N12 Pneumatic Lab", x: 2.5, z: -46.2 },
            "n2": { name: "N2 Bio Tech Lab", x: 2.5, z: -86.1 },
            "n1": { name: "N1 Hydraulic Lab", x: 2.5, z: -93.8 }
        };

        const synth = window.speechSynthesis;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

        const speak = (text) => {
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0;
            synth.speak(utter);
        };

        const startNav = async (id) => {
            const dest = mapData[id];
            if(!dest) return;

            const marker = document.getElementById('nav-marker');
            const label = document.getElementById('marker-label');

            marker.setAttribute('position', `${dest.x} 0.5 ${dest.z}`);
            label.setAttribute('position', `${dest.x} 2.2 ${dest.z}`);
            marker.setAttribute('visible', 'true');
            label.setAttribute('visible', 'true');
            label.setAttribute('value', dest.name.toUpperCase());

            const dist = Math.sqrt(dest.x**2 + dest.z**2).toFixed(1);
            speak(`Navigating to ${dest.name}. It is about ${dist} meters away. Follow the blue indicator.`);

            await addDoc(collection(db, "NavLogs"), { destination: dest.name, timestamp: serverTimestamp() });
        };

        document.getElementById('voice-trigger').onclick = () => { recognition.start(); };
        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript.toLowerCase();
            for (let id in mapData) {
                if(transcript.includes(id) || transcript.includes(mapData[id].name.toLowerCase())) {
                    document.getElementById('end-node').value = id;
                    startNav(id);
                    return;
                }
            }
            speak("Room not recognized. Please try the room code.");
        };

        document.getElementById('go-btn').onclick = () => {
            const val = document.getElementById('end-node').value;
            if(val) startNav(val);
        };
    </script>
</body>
</html>
