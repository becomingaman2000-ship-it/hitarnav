<!DOCTYPE html>
<html>
  <head>
    <title>VR Office</title>

    <!-- A-Frame VR library -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- Teleport controls for VR navigation -->
    <script src="https://unpkg.com/aframe-teleport-controls@0.4.0/dist/aframe-teleport-controls.min.js"></script>
  </head>

 <body>

  <a-scene>

    <!-- Lighting -->
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="1 2 1"></a-light>

    <!-- Sky -->
    <a-sky color="#cccccc"></a-sky>

    <!-- Floor -->
    <a-plane rotation="-90 0 0" width="30" height="30" color="Black"></a-plane>

    <!-- left passage Wall sections -->
    <a-box position="0 1 -7" width="0.1" height="8" depth="4" color="red"></a-box>
    <a-box position="0 1 -1" width="0.1" height="8" depth="4" color="red"></a-box>
    <a-box position="0 1 5" width="0.1" height="8" depth="4" color="red"></a-box>

    <!-- font walls -->
    <!-- <a-box position="-2.56 1 7" width="5" height="8" depth="0.1" color="red"></a-box> -->
    <a-box position="7.5 1 7" width="5" height="8" depth="0.1" color="white"></a-box>
    <a-box position="7.5 1 -1" width="5" height="8" depth="0.1" color="white"></a-box>
    <a-box position="7.5 1 -9" width="5" height="8" depth="0.1" color="white"></a-box>

    <!--left room diveder walls -->
    <a-box position="-2.56 1 -9" width="5" height="8" depth="0.1" color="white"></a-box>
    <a-box position="-2.56 1 -1" width="5" height="8" depth="0.1" color="white"></a-box>
    <a-box position="-2.56 1 7" width="5" height="8" depth="0.1" color="white"></a-box>


    <!-- right Wall sections -->
    <a-box position="5 1 -7" width="0.1" height="8" depth="4" color="red"></a-box>
    <a-box position="5 1 -1" width="0.1" height="8" depth="4" color="red"></a-box>
    <a-box position="5 1 5" width="0.1" height="8" depth="4" color="red"></a-box>

    <!-- outside walls -->
    <a-box position="10 1 -1" width="0.1" height="8" depth="16" color="red"></a-box>
    <a-box position="-5 1 -1" width="0.1" height="8" depth="16" color="red"></a-box>

    <!-- Doors (in the gaps) -->
    <!-- <a-box position="0 2 -4" width="0.1" height="4" depth="3" color="brown"></a-box>

    <a-box position="0 2 2" width="0.1" height="4" depth="3" color="brown"></a-box> -->

    <!-- YOU (camera/player) -->
     <a-entity position="1 1.6 15">
      <a-camera wasd-controls look-controls>
        <a-cursor></a-cursor>
      </a-camera>
    </a-entity>

    <!-- YOU (camera/player) -->
    <!-- <a-entity position="4 9.6 20">
      <a-camera wasd-controls look-controls>
        <a-cursor></a-cursor>
      </a-camera>
    </a-entity> -->

  </a-scene>

</body>
</html>
