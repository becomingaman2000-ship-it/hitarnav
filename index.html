<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>HIT AR Nav</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      /* This CSS forces the camera to fill the whole screen without white bars */
      body { margin: 0; overflow: hidden; }
      canvas { width: 100% !important; height: 100% !important; margin-left: 0 !important; }
    </style>
  </head>

  <body>
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720; canvasWidth: 1280; canvasHeight: 720;"
      vr-mode-ui="enabled: false">

      <a-assets>
        <a-asset-item id="building" src="assets/building.glb"></a-asset-item>
        <img id="floorplan" src="assets/61334.jpg">
      </a-assets>

      <a-entity 
        gltf-model="#building" 
        position="0 0 -5" 
        scale="0.5 0.5 0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
      </a-entity>

      <a-plane 
        src="#floorplan" 
        rotation="-90 0 0" 
        width="4" 
        height="4" 
        position="0 -1 -5">
      </a-plane>

      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
