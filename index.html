<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Navigator | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-cyan-500 to-blue-600 p-8 text-white text-center">
            <h1 class="text-3xl font-bold italic tracking-tighter">HIT NAVIGATOR</h1>
            <p class="text-sm opacity-80">Enterprise Campus Management</p>
        </div>

        <div class="p-8">
            <form id="auth-form">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">HIT Email</label>
                    <input type="email" id="email" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-cyan-400" required>
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Account Type</label>
                    <select id="role" class="w-full p-3 border rounded-xl outline-none bg-slate-50">
                        <option value="student">Student</option>
                        <option value="staff">Staff</option>
                        <option value="guest">Guest</option>
                        <option value="admin">Admin (Chairman)</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Password</label>
                    <input type="password" id="password" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-cyan-400" required>
                </div>
                <div class="flex gap-2">
                    <button type="button" id="loginBtn" class="flex-1 bg-slate-100 text-slate-700 py-3 rounded-xl font-bold hover:bg-slate-200 transition">LOGIN</button>
                    <button type="button" id="signupBtn" class="flex-1 bg-cyan-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-cyan-600 transition">SIGN UP</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcendyEqvaAw7ldnFOSwDEfQb74L_wfmw",
            authDomain: "hit-navigator-56b2b.firebaseapp.com",
            projectId: "hit-navigator-56b2b",
            storageBucket: "hit-navigator-56b2b.firebasestorage.app",
            messagingSenderId: "744294498866",
            appId: "1:744294498866:web:94aea9f4db7a998256722b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                let userCredential;
                if (type === 'signup') {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, role + "s", userCredential.user.uid), {
                        email: email,
                        role: role,
                        createdAt: serverTimestamp()
                    });
                } else {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                }

                await addDoc(collection(db, "Logins"), {
                    uid: userCredential.user.uid,
                    email: email,
                    role: role,
                    timestamp: serverTimestamp()
                });

                localStorage.setItem('hit_user_role', role);
                localStorage.setItem('hit_user_email', email);
                window.location.href = 'dashboard.html';
            } catch (e) { alert(e.message); }
        };

        document.getElementById('loginBtn').onclick = () => window.handleAuth('login');
        document.getElementById('signupBtn').onclick = () => window.handleAuth('signup');
    </script>
</body>
</html>
