<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>HIT AR Navigation Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
      
      /* UI Panel */
      #ui-panel {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: #00ffcc; padding: 15px;
        border-radius: 10px; z-index: 100; text-align: center; width: 70%;
      }

      /* Map Toggle Button */
      #map-btn {
        position: fixed; top: 20px; right: 20px;
        padding: 15px; background: #2ecc71; border: none; border-radius: 50%;
        color: white; font-weight: bold; z-index: 200; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }

      /* 2D Digital Map Overlay */
      #map-container {
        display: none; position: fixed; top: 10%; left: 5%;
        width: 90%; height: 75%; background: #1a1a1a; border: 2px solid #00ffcc;
        z-index: 150; border-radius: 20px; overflow: hidden;
      }
      
      .map-svg { width: 100%; height: 100%; }

      /* Green Navigation Arrow */
      #user-arrow {
        position: absolute; top: 70%; left: 50%;
        width: 0; height: 0; 
        border-left: 12px solid transparent;
        border-right: 12px solid transparent;
        border-bottom: 24px solid #00ffcc;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 0 5px #00ffcc);
      }
    </style>
  </head>

  <body>
    <button id="map-btn">MAP</button>

    <div id="map-container">
      <svg class="map-svg" viewBox="0 0 200 200">
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#333" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        
        <rect x="40" y="40" width="120" height="120" fill="none" stroke="#00ffcc" stroke-width="2" />
        <line x1="100" y1="40" x2="100" y2="160" stroke="#00ffcc" stroke-dasharray="4"/>
        <text x="50" y="60" fill="#00ffcc" font-size="8">LIBRARY</text>
        <text x="110" y="60" fill="#00ffcc" font-size="8">LAB 1</text>
        <text x="50" y="150" fill="#00ffcc" font-size="8">OFFICE</text>
      </svg>
      <div id="user-arrow"></div>
    </div>

    <div id="ui-panel">
      <div id="status">Tap Screen to Begin</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="building" src="assets/building.glb"></a-asset-item>
        <img id="floorplan" src="assets/blueprint.jpeg">
      </a-assets>

      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.9; position: 1 3 2"></a-entity>

      <a-entity 
        id="main-building"
        gltf-model="#building" 
        position="0 -1.4 -5" 
        scale="0.4 0.4 0.4"
        edge-logic
        animation="property: rotation; to: 0 360 0; loop: true; dur: 25000">
      </a-entity>

      <a-plane src="#floorplan" rotation="-90 0 0" width="12" height="12" position="0 -1.5 -5"></a-plane>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // 1. SOLID VIEW / EDGE RENDERING LOGIC
      AFRAME.registerComponent('edge-logic', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const obj = this.el.getObject3D('mesh');
            obj.traverse(node => {
              if (node.isMesh) {
                // Set the base color to a dark Slate Gray
                node.material.color.set(0x2c3e50); 
                node.material.metalness = 0.2;
                node.material.roughness = 0.8;

                // Create White Outlines for "Solid View"
                const edges = new THREE.EdgesGeometry(node.geometry);
                const line = new THREE.LineSegments(
                  edges, 
                  new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 })
                );
                node.add(line);
              }
            });
          });
        }
      });

      // 2. MAP TOGGLE LOGIC
      const mapBtn = document.getElementById('map-btn');
      const mapContainer = document.getElementById('map-container');
      mapBtn.onclick = () => {
        const isVisible = mapContainer.style.display === 'block';
        mapContainer.style.display = isVisible ? 'none' : 'block';
        mapBtn.innerText = isVisible ? 'MAP' : 'X';
        mapBtn.style.background = isVisible ? '#2ecc71' : '#e74c3c';
      };

      // 3. VOICE LOGIC (Tap to start)
      window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.onresult = (event) => {
        const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
        document.getElementById('status').innerText = "Target: " + command;
      };
      window.onclick = () => { recognition.start(); };
    </script>
  </body>
</html>
