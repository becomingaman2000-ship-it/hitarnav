<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>HIT Precision AR-Nav</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
      #nav-panel {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        width: 95%; background: rgba(255,255,255,0.95); border-radius: 12px; padding: 10px;
        z-index: 3000; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid #00ffcc;
      }
      .input-row { display: flex; align-items: center; padding: 5px 0; }
      .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }
      select { border: none; width: 100%; font-size: 14px; background: transparent; font-weight: 600; }
      
      #ai-btn {
        position: fixed; bottom: 30px; right: 20px; width: 65px; height: 65px;
        background: radial-gradient(circle, #00ffcc, #0088aa); border-radius: 50%;
        z-index: 4000; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 20px #00ffcc; cursor: pointer;
      }
      #map-container {
        display: none; position: fixed; top: 15%; left: 5%; width: 90%; height: 60%;
        background: #000; border: 2px solid #00ffcc; border-radius: 15px; z-index: 2500;
      }
      #status-toast {
        position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
        background: rgba(0,255,204,0.2); color: #00ffcc; padding: 8px 20px;
        border-radius: 20px; border: 1px solid #00ffcc; z-index: 2000; font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div id="nav-panel">
      <div class="input-row"><div class="dot" style="background:#2ecc71"></div>
        <select id="start-node">
          <option value="entrance">Main Entrance</option>
          </select>
      </div>
      <div class="input-row"><div class="dot" style="background:#e74c3c"></div>
        <select id="end-node" onchange="initiateNav()"></select>
      </div>
    </div>

    <div id="ai-btn" onclick="startVoiceAI()">
        <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" width="30" style="filter:invert(1)">
    </div>

    <div id="status-toast">Detecting Movement...</div>

    <div id="map-container">
      <canvas id="topViewCanvas"></canvas>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
      <a-assets>
        <a-asset-item id="building-model" src="assets/building.glb"></a-asset-item>
      </a-assets>

      <a-entity id="building" gltf-model="#building-model" position="0 -1.5 -5" scale="1 1 1" wireframe-material></a-entity>

      <a-entity id="navigation-path" line="color: #00ffcc; opacity: 0.8"></a-entity>
      
      <a-sphere id="target-point" radius="0.3" color="#ff4d4d" visible="false"
                animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true"></a-sphere>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // 1. COMPREHENSIVE ROOM DATABASE (All 20+ Rooms)
      const rooms = {
        "n1": {x: 35, y: 10, name: "Hydraulic Lab"}, "n2": {x: 28, y: 10, name: "Biotech Lab"},
        "n3": {x: 21, y: 10, name: "CPSE Lab"}, "n4": {x: 14, y: 10, name: "CS 1"},
        "n5": {x: 7, y: 10, name: "IME 1"}, "n6": {x: 0, y: 10, name: "Pharmacy Lab"},
        "s1": {x: 35, y: 30, name: "Conference Room"}, "s2": {x: 28, y: 30, name: "CS Lab 2"},
        "s3": {x: 21, y: 30, name: "SME Lab 1"}, "s4": {x: 14, y: 30, name: "SME Lab 2"},
        "s8": {x: 0, y: 30, name: "IME 3"}, "library": {x: -10, y: 40, name: "Library Reserve"},
        "chairman": {x: 30, y: 45, name: "Chairman Office"}, "toilets": {x: 15, y: 20, name: "Restrooms"}
        // Add remaining rooms following this 7m/9m grid pattern
      };

      // Populate Select Menus
      const startSelect = document.getElementById('start-node');
      const endSelect = document.getElementById('end-node');
      Object.keys(rooms).forEach(id => {
        let opt = `<option value="${id}">${id.toUpperCase()}: ${rooms[id].name}</option>`;
        startSelect.innerHTML += opt;
        endSelect.innerHTML += opt;
      });

      // 2. REAL-TIME MOVEMENT & ROTATION
      let userPos = { x: 0, y: 0, z: 0 };
      let compassHeading = 0;

      window.addEventListener('deviceorientation', (e) => {
        compassHeading = e.webkitCompassHeading || (360 - e.alpha);
        const b = document.getElementById('building');
        b.setAttribute('rotation', `0 ${compassHeading} 0`);
      });

      // Pedometer Logic (Simulated movement for demo - can link to Acceleration API)
      window.addEventListener('devicemotion', (e) => {
        let acc = e.accelerationIncludingGravity;
        if(Math.abs(acc.x) > 1.5) { // Simple step detection
           userPos.z -= 0.1; // Move forward in AR space
           updateUI();
        }
      });

      // 3. TRANSPARENT WIREFRAME LOGIC
      AFRAME.registerComponent('wireframe-material', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            mesh.traverse(node => {
              if (node.isMesh) {
                node.material.wireframe = true;
                node.material.color.set(0x00ffcc);
                node.material.transparent = true;
                node.material.opacity = 0.3;
              }
            });
          });
        }
      });

      // 4. VOICE & PATHFINDING
      const synth = window.speechSynthesis;
      function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.voice = synth.getVoices().find(v => v.name.includes("Google UK English Male")) || u.voice;
        u.rate = 0.85; synth.speak(u);
      }

      function initiateNav() {
        const start = startSelect.value;
        const end = endSelect.value;
        const dx = rooms[end].x - rooms[start].x;
        const dy = rooms[end].y - rooms[start].y;
        
        const pathMsg = `Exit your current room. Turn ${dx > 0 ? 'Right' : 'Left'}. Walk ${Math.abs(dx)} meters. Then turn toward the ${rooms[end].name}.`;
        speak(pathMsg);
        
        // Update AR Path
        const target = document.getElementById('target-point');
        target.setAttribute('position', `${dx} -1 ${-dy}`);
        target.setAttribute('visible', 'true');
      }

      function startVoiceAI() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.onresult = (e) => {
            const cmd = e.results[0][0].transcript.toLowerCase();
            Object.keys(rooms).forEach(r => { if(cmd.includes(r)) { endSelect.value = r; initiateNav(); }});
        };
        rec.start();
        speak("Which room can I help you find?");
      }

      function updateUI() {
        document.getElementById('status-toast').innerText = `POS: ${userPos.z.toFixed(1)}m | Heading: ${Math.round(compassHeading)}°`;
      }
    </script>
  </body>
</html>
