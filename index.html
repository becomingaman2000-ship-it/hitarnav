<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>HIT AR Navigation</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      /* UI for Voice Feedback */
      #ui-panel {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.7); color: white; padding: 15px;
        border-radius: 10px; z-index: 1000; text-align: center; width: 80%;
      }
      canvas { width: 100% !important; height: 100% !important; }
    </style>
  </head>

  <body>
    <div id="ui-panel">
      <div id="status">Say "Go to Library" or "Find Lab"</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="building" src="assets/building.glb"></a-asset-item>
        <img id="floorplan" src="assets/61334.jpg">
      </a-assets>

      <a-entity 
        id="main-building"
        gltf-model="#building" 
        position="0 -1.4 -5" 
        scale="0.3 0.3 0.3"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; pauseEvents: stop-rot">
      </a-entity>

      <a-plane 
        src="#floorplan" 
        rotation="-90 0 0" 
        width="15" 
        height="15" 
        position="0 -1.5 -5">
      </a-plane>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // VOICE LOGIC - The "Brain"
      window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.lang = 'en-US';

      const statusText = document.getElementById('status');
      const building = document.getElementById('main-building');

      recognition.onresult = (event) => {
        const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
        statusText.innerText = "Heard: " + command;

        // Example Logic: Change color or stop rotation based on voice
        if (command.includes("stop")) {
          building.emit('stop-rot');
          statusText.style.color = "#ff4444";
          statusText.innerText = "Stopping Rotation...";
        } 
        if (command.includes("library") || command.includes("lab")) {
          statusText.style.color = "#44ff44";
          statusText.innerText = "Navigating to: " + command;
          // Here we will later add the logic to draw a line to the destination
        }
      };

      // Start listening as soon as the user interacts with the screen
      window.addEventListener('click', () => {
        recognition.start();
        statusText.innerText = "Listening...";
      });
    </script>
  </body>
</html>
