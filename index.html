<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>HIT AR Navigation Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      
      /* UI Panel */
      #ui-panel {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: #00ffcc; padding: 15px;
        border-radius: 10px; z-index: 100; text-align: center; width: 70%;
      }

      /* Map Toggle Button */
      #map-btn {
        position: fixed; top: 20px; right: 20px;
        padding: 15px; background: #00ffcc; border: none; border-radius: 50%;
        font-weight: bold; z-index: 200; box-shadow: 0 0 10px rgba(0,0,0,0.5);
      }

      /* 2D Map Overlay */
      #map-container {
        display: none; position: fixed; top: 10%; left: 10%;
        width: 80%; height: 70%; background: white; border: 5px solid #333;
        z-index: 150; border-radius: 15px; overflow: hidden;
      }
      #map-img { width: 100%; height: 100%; object-fit: contain; }
      #user-arrow {
        position: absolute; top: 50%; left: 50%;
        width: 0; height: 0; 
        border-left: 10px solid transparent;
        border-right: 10px solid transparent;
        border-bottom: 20px solid #2ecc71; /* Green Arrow */
        transform: translate(-50%, -50%);
      }
    </style>
  </head>

  <body>
    <button id="map-btn">MAP</button>

    <div id="map-container">
      <img id="map-img" src="assets/blueprint.jpeg">
      <div id="user-arrow"></div>
    </div>

    <div id="ui-panel">
      <div id="status">Tap screen for Voice</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="building" src="assets/building.glb"></a-asset-item>
        <img id="floorplan" src="assets/blueprint.jpeg">
      </a-assets>

      <a-entity 
        id="main-building"
        gltf-model="#building" 
        position="0 -1.4 -5" 
        scale="0.4 0.4 0.4"
        grayscale-model
        animation="property: rotation; to: 0 360 0; loop: true; dur: 25000">
      </a-entity>

      <a-plane src="#floorplan" rotation="-90 0 0" width="12" height="12" position="0 -1.5 -5"></a-plane>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // 1. GRAYSCALE LOGIC
      AFRAME.registerComponent('grayscale-model', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            mesh.traverse(node => {
              if (node.isMesh) {
                node.material.color.set(0x808080); // Set to Medium Gray
                node.material.roughness = 0.8; 
              }
            });
          });
        }
      });

      // 2. MAP TOGGLE LOGIC
      const mapBtn = document.getElementById('map-btn');
      const mapContainer = document.getElementById('map-container');
      mapBtn.onclick = () => {
        const isVisible = mapContainer.style.display === 'block';
        mapContainer.style.display = isVisible ? 'none' : 'block';
        mapBtn.innerText = isVisible ? 'MAP' : 'X';
      };

      // 3. VOICE LOGIC (Brief)
      window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.onresult = (event) => {
        const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
        document.getElementById('status').innerText = "Heard: " + command;
      };
      window.onclick = () => { recognition.start(); };
    </script>
  </body>
</html>
