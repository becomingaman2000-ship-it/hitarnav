<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>HIT NAV PRO | VR Wireframe Navigator</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-gps-geographic-tracking.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div class="fixed top-0 left-0 z-50 p-6 w-full pointer-events-none">
        <div class="flex justify-between items-start">
            <div class="bg-black/70 backdrop-blur-md p-4 rounded-3xl border border-cyan-500/30">
                <h2 class="text-cyan-400 font-black tracking-tighter text-xl italic">VR MESH OVERLAY</h2>
                <div class="mt-2 space-y-1">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Lat: <span id="lat-display" class="text-white">--</span></p>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Lng: <span id="lng-display" class="text-white">--</span></p>
                    <p class="text-[9px] text-green-500 font-black animate-pulse uppercase">● Google Indoor Sync Active</p>
                </div>
            </div>
            
            <div class="bg-black/70 backdrop-blur-md p-4 rounded-3xl border border-white/10 text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Current Speed</p>
                <p id="speed-display" class="text-2xl font-black text-white">0.0 <span class="text-xs text-slate-500">m/s</span></p>
            </div>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="campus-mesh" src="building.glb"></a-asset-item>
        </a-assets>

        <a-entity 
            gltf-model="#campus-mesh" 
            gps-entity-place="latitude: -17.8202; longitude: 31.0532;" 
            scale="1 1 1"
            material="wireframe: true; wireframeLinewidth: 2; color: #22d3ee; opacity: 0.8"
            animation="property: material.opacity; from: 0.3; to: 0.8; dir: alternate; dur: 2000; loop: true">
        </a-entity>

        <a-camera gps-camera rotation-reader>
            <a-cursor color="#22d3ee" fuse="false"></a-cursor>
        </a-camera>

    </a-scene>

    <script>
        // Real-Time Movement Logic (Google Maps/Indoor Nav Simulation)
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const speed = position.coords.speed || 0;

                // Update HUD
                document.getElementById('lat-display').innerText = lat.toFixed(6);
                document.getElementById('lng-display').innerText = lng.toFixed(6);
                document.getElementById('speed-display').innerText = speed.toFixed(1);

                // Note: The 'gps-camera' in A-Frame automatically handles the 
                // physical movement translation to the 3D scene.
                console.log(`User moved to: ${lat}, ${lng}`);
            }, 
            (err) => console.error("Location Error:", err),
            {
                enableHighAccuracy: true, // Forces usage of GPS instead of just WiFi
                maximumAge: 0,
                timeout: 27000
            });
        } else {
            alert("Geolocation is not supported by this browser.");
        }
    </script>
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] flex items-center gap-2 bg-slate-900/80 backdrop-blur-2xl p-2 rounded-[2rem] border border-white/10 shadow-2xl">
    
    <a href="student_hub.html" class="flex flex-col items-center justify-center w-14 h-14 rounded-full transition-all hover:bg-cyan-500/20 group">
        <span class="text-xl group-hover:scale-110 transition">📅</span>
        <span class="text-[8px] font-black text-slate-500 group-hover:text-cyan-400 uppercase tracking-tighter">Hub</span>
    </a>

    <a href="navigator_vr.html" class="flex flex-col items-center justify-center w-16 h-16 bg-cyan-600 rounded-full shadow-[0_0_20px_rgba(34,211,238,0.4)] hover:bg-cyan-500 transition-all active:scale-95 group">
        <span class="text-2xl">🥽</span>
        <span class="text-[8px] font-black text-white uppercase tracking-tighter">VR View</span>
    </a>

    <a href="campus_map_2d.html" class="flex flex-col items-center justify-center w-14 h-14 rounded-full transition-all hover:bg-green-500/20 group">
        <span class="text-xl group-hover:scale-110 transition">📍</span>
        <span class="text-[8px] font-black text-slate-500 group-hover:text-green-400 uppercase tracking-tighter">Map</span>
    </a>
</div>

<style>
    /* Ensure the dock doesn't interfere with map/VR clicks */
    .pointer-events-auto { pointer-events: auto; }
</style>
</body>
</html>
