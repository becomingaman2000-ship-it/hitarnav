<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIT Navigator | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hit-accent { background: linear-gradient(135deg, #00ffcc 0%, #00b4d8 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        <div class="hit-accent p-8 text-white text-center">
            <h1 class="text-3xl font-bold tracking-tight italic">HIT NAVIGATOR</h1>
            <p class="text-sm opacity-80 mt-1">Smart Campus Navigation System</p>
        </div>

        <div class="p-8">
            <div class="flex mb-8 border-b">
                <button id="btn-login" class="flex-1 pb-2 border-b-2 border-cyan-500 font-bold text-cyan-600">Login</button>
                <button id="btn-signup" class="flex-1 pb-2 border-b-2 border-transparent text-slate-400 cursor-not-allowed">Sign Up</button>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">University Email</label>
                    <input type="email" id="email" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-cyan-400" placeholder="e.g. hit2026@hit.ac.zw" required>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Account Type</label>
                    <select id="role" class="w-full p-3 border rounded-lg outline-none bg-white">
                        <option value="student">Student</option>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin (Chairman)</option>
                        <option value="guest">Guest</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Password</label>
                    <input type="password" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-cyan-400" placeholder="••••••••" required>
                </div>

                <button type="submit" class="hit-accent w-full text-white py-4 rounded-xl font-bold shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all">
                    ENTER CAMPUS
                </button>
            </form>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const role = document.getElementById('role').value;
            const email = document.getElementById('email').value;

            // Store user data locally so the system remembers who you are
            localStorage.setItem('hit_user_role', role);
            localStorage.setItem('hit_user_email', email);

            // Redirect to the Dashboard
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
